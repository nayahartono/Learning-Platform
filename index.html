ntum. They show others you understand what needs to be done and that you can deliver results — even before you have full organizational power."</p></div><div class="callout c-case"><h4>Case study: The early win that unlocked a career</h4><p>A demand planning analyst, fresh out of university, noticed in her third week that a high-volume clothing category was consistently 18–22% over-actual in January–February. This wasn't a one-off error — it was a systematic bias that had been in the model for at least three years. She built a simple analysis showing the pattern and calculated the excess inventory cost over three years: approximately Rp 890 million in unnecessary holding costs and markdowns.</p><p>She presented it to her manager in a one-page document, framed as "something I found in the data worth looking at" — not as a critique of the existing process. The CFO was briefed. The model was corrected. She received a formal commendation in her 90-day review and was given substantially more autonomy than her seniority normally warranted, because she had demonstrated judgment, rigor, and communication ability in a single act.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Brainstorm 6 potential early wins for your first 45 days at Kanmo. Score each against the four criteria (Visible, Achievable, Meaningful, Reputation-consistent) on a 1–3 scale. Pick your top 2 and write a full execution plan for each: exactly what you'd deliver, who benefits and how, what data or access you'd need, realistic timeline, and how you'd present it to maximize impact without appearing to self-promote.</p></div>`},
{d:14,title:"Financial modelling basics",phase:2,pillar:"fm",tags:["fm"],time:"55 min",content:`<h2>Financial modelling basics — speaking the language of the business</h2><div class="mod-meta">Phase 2 · Day 14 · Financial Modelling · 55 min</div><p>Demand planning and financial planning are two sides of the same coin. Your forecast drives the revenue line. Your inventory levels affect working capital. Your accuracy determines whether gross margin targets are hit or missed. If you can't connect demand numbers to financial statements, you'll always be seen as "the planning person" rather than a business partner. Learning to speak Finance is one of the highest-leverage things you can do.</p><h3>The P&L structure</h3><p><strong>Net Revenue:</strong> Units sold × average selling price. Your volume forecast drives this directly. An over-forecast that leads to excessive promotions also reduces ASP — double impact on the top line.</p><p><strong>COGS (Cost of Goods Sold):</strong> The direct cost of the products you sold — buying cost, import duties, inbound freight. COGS = Units sold × cost per unit.</p><p><strong>Gross Profit:</strong> Revenue − COGS. The profit before overhead, marketing, and operating costs.</p><p><strong>Gross Margin %:</strong> Gross Profit / Revenue × 100. The single most tracked retail profitability metric. A 60% gross margin means Rp 60 of every Rp 100 revenue remains after paying for the product.</p><p><strong>OPEX (Operating Expenses):</strong> Salaries, rent, marketing, utilities. Mostly fixed — they don't change based on your forecast, but your accuracy affects how efficiently they're leveraged.</p><p><strong>EBITDA:</strong> Earnings Before Interest, Tax, Depreciation, Amortization. Gross Profit − OPEX. The most common measure of operational profitability.</p><div class="callout c-formula"><h4>Core calculations — worked example</h4><p>10,000 units × Rp 350,000 ASP = <strong>Rp 3.5B revenue</strong><br/>10,000 units × Rp 140,000 COGS = <strong>Rp 1.4B COGS</strong><br/>Gross Profit = 3.5B − 1.4B = <strong>Rp 2.1B</strong><br/>Gross Margin = 2.1/3.5 × 100 = <strong>60%</strong><br/>If OPEX = Rp 800M: EBITDA = 2.1B − 0.8B = <strong>Rp 1.3B</strong></p></div><h3>How over-forecasting destroys gross margin</h3><p>This connection is the one most demand planners don't fully appreciate until they've seen it happen. The chain: over-forecast → excess inventory builds → inventory must be marked down to clear → lower ASP → lower gross margin → Finance is unhappy → demand planner is blamed.</p><p>Conversely, under-forecasting causes stockouts (lost revenue, permanent) and emergency air freight replenishment (COGS spikes 6–10x on emergency units). Both errors hurt gross margin — just through different mechanisms.</p><h3>Inventory on the balance sheet</h3><p>Inventory is a balance sheet asset. It represents cash that has been converted to physical goods. The more inventory held, the more cash is tied up and unavailable for other uses. The CFO cares about DIO (Day 11) precisely because it's a measure of cash efficiency.</p><p><strong>Working capital impact:</strong> A reduction in average DIO of 5 days at a mid-sized retailer might free up Rp 5–10 billion in cash — money that can fund growth, reduce bank debt, or improve returns. Your inventory planning decisions directly move this number.</p><h3>How demand forecasts drive the annual budget</h3><ol><li>You produce volume forecast by brand and category for 12–18 months.</li><li>Commercial teams apply pricing assumptions → Revenue budget.</li><li>Finance applies COGS assumptions → Gross profit budget.</li><li>Finance adds OPEX → EBITDA budget, approved by leadership.</li></ol><p>If your volume forecast changes by 10%, the entire financial budget shifts. Understanding this chain of causality makes you a more responsible and influential forecaster.</p><div class="callout c-case"><h4>Case study: When a demand planner changed the CFO's mind</h4><p>Asked to contribute to the annual budget for the first time, a demand planner prepared a three-scenario forecast (not a single number) and connected each scenario to its gross margin and working capital implications. She calculated that the upside scenario required Rp 8.5 billion more inventory investment than the base case — capital the company didn't currently have access to.</p><p>The CFO had been assuming the upside scenario in his financial projections. The working capital implication was a genuine surprise. The budget was revised to the base case, with a defined trigger (>15% above plan for 3 consecutive months) that would authorize additional inventory investment. This financially-connected approach is exactly what separates a BA Associate Manager from an analyst who just runs numbers.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Build a P&L model for one Kanmo brand for one quarter. Base: 25,000 units, ASP Rp 380,000, COGS Rp 150,000/unit, OPEX Rp 800M.</p><p>(1) Calculate Revenue, Gross Profit, Gross Margin%, and EBITDA. (2) What happens to each metric if volume is 10% below base? (3) What happens if a markdown reduces ASP by 8% on 30% of units (the rest sell at full price)? (4) What is the combined impact of the volume shortfall AND the markdown scenario? (5) At what gross margin% does the business break even (EBITDA = 0) if OPEX is fixed? (6) Write a two-sentence explanation of the combined scenario for a CFO who doesn't want to see the spreadsheet.</p></div>`},
{d:15,title:"Excel for demand planning",phase:2,pillar:"dp",tags:["dp"],time:"55 min",content:`<h2>Excel for demand planning — the tools you'll use every single day</h2><div class="mod-meta">Phase 2 · Day 15 · Demand Planning · 55 min</div><p>Excel remains the dominant planning tool in most Southeast Asian companies, including most at the scale of Kanmo Group. This isn't backwardness — Excel is genuinely powerful when used correctly. The demand planners who struggle use it the way a consumer does: basic tables and charts. The ones who excel (pun intended) use it as an analytical engine: dynamic models, automated data pulls, scenario simulation. This module covers the 8 techniques that will serve you most.</p><h3>1. SUMIFS — your most-used function</h3><div class="callout c-formula"><h4>Syntax & example</h4><p>=SUMIFS(sum_range, criteria_range1, criteria1, criteria_range2, criteria2, ...)</p><p>Total sales for brand "Justice" in month "July":<br/>=SUMIFS(C:C, A:A, "Justice", B:B, "July")<br/>Where col A = brand, col B = month, col C = sales units.</p><p>Add more criteria pairs for SKU, store, etc. Master SUMIFS and you can aggregate any slice of your data without pivot tables — faster, more auditable, and easier to automate.</p></div><h3>2. INDEX-MATCH — upgrade from VLOOKUP</h3><div class="callout c-formula"><h4>Syntax & example</h4><p>=INDEX(return_column, MATCH(lookup_value, lookup_column, 0))</p><p>Find unit cost for SKU "JS-001":<br/>=INDEX(CostColumn, MATCH("JS-001", SKUColumn, 0))</p><p>Two-dimensional lookup (brand + month from a seasonal index table):<br/>=INDEX(IndexMatrix, MATCH(brand, BrandList, 0), MATCH(month, MonthList, 0))</p><p>Advantages over VLOOKUP: works with any column order, doesn't break when columns are inserted, faster on large datasets, can look left not just right.</p></div><h3>3. FORECAST.ETS — statistical forecasting built in</h3><div class="callout c-formula"><h4>Syntax</h4><p>=FORECAST.ETS(target_date, values, timeline, [seasonality], [data_completion], [aggregation])</p><p>Simplest version: =FORECAST.ETS(target_date, historical_values, historical_dates)</p><p>Excel auto-detects seasonality and applies the appropriate exponential smoothing model. Returns a point forecast. Use FORECAST.ETS.CONFINT to get confidence intervals — which gives you the range-based forecast that builds stakeholder credibility.</p></div><h3>4. Pivot tables — rapid aggregation</h3><p>Pivot tables are the fastest way to slice and summarize large datasets. For demand planning: summarize actual vs forecast by brand/category/month, identify highest-variance SKUs, calculate MAPE by product category in seconds, analyze sell-through by store. <strong>Power tip:</strong> use calculated fields to add custom metrics like MAPE or variance% directly inside the pivot — you get the calculation without touching the raw data.</p><h3>5. Power Query — data connection and transformation</h3><p>Power Query connects directly to data sources (ERP exports, CSV files, SharePoint folders), refreshes with one click, and automates transformations that would otherwise take hours of manual work. Key operations:</p><ul><li><strong>Append queries:</strong> Stack multiple monthly files into one master table automatically.</li><li><strong>Merge queries:</strong> Join sales data with product master, store master, and supplier data — like SQL joins but with a visual interface.</li><li><strong>Transform:</strong> Unpivot wide tables (months as columns) into tall tables (month as a row field) — the format most analytical functions need.</li><li><strong>Conditional column:</strong> Add calculated flags (e.g., "High variance" if MAPE > 25%) without formulas in the data sheet.</li></ul><p>Time investment: 2 weeks to get comfortable. Return: 3–5 hours per week saved on data preparation, every week, for the rest of your career.</p><h3>6. Data validation — protect your model from input errors</h3><p>When your model accepts inputs from other people (Sales managers entering volume adjustments, brand managers confirming promotional uplifts), data validation prevents the errors that corrupt your forecasts. Use dropdown lists for categorical inputs, number range constraints for uplift percentages, and custom formulas to flag inputs that are suspiciously high or low.</p><h3>7. Conditional formatting for exception management</h3><p>Your weekly report should allow a 60-second scan to identify the 3 SKUs needing action — without reading every number. Use: traffic lights (red/amber/green) for DIO status, data bars to visualize MAPE magnitude across SKUs, color scales for sell-through rates across stores. Rule of thumb: if it takes more than 2 minutes to find the most important thing in your report, the report is failing its job.</p><h3>8. Named ranges and structured tables</h3><p>Using Excel Tables (Ctrl+T) and named ranges makes formulas dramatically more readable and maintainable. =SUMIFS(Sales[Units], Sales[Brand], "Justice") is infinitely more auditable than =SUMIFS($C$2:$C$10000, $A$2:$A$10000, "Justice"). This matters when you hand your model to someone else — or to future you — six months from now.</p><div class="callout c-case"><h4>Case study: The rebuild that saved 8 hours a week</h4><p>A demand planner was spending 8–10 hours every month preparing the demand review pack — manually copying from ERP exports into Excel, applying formulas, reformatting charts. The process was error-prone (wrong data had once been presented to the CEO) and consumed time that should have gone to analysis.</p><p>She rebuilt the model using Power Query to connect directly to ERP exports. When monthly files were dropped into a SharePoint folder, the model refreshed in 45 seconds. Charts and commentary template were pre-built; she only updated the narrative text. Monthly pack preparation time went from 8 hours to 90 minutes. The 6.5 hours saved weekly was invested in deeper analysis — which led to a 12% improvement in forecast accuracy over two quarters.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Design a demand planning Excel model for one Kanmo brand — describe it in detail without building it yet:</p><p>(1) What sheets (tabs) does the model have, and what is the purpose of each? (2) The 5 most important formulas — write the formula structure (not cell references) for each. (3) What data sources feed into it, and how would you use Power Query to connect them? (4) What does the weekly exception report look like — describe the layout and the 3 KPIs it highlights? (5) What are the 3 manual steps in the current reporting process that Power Query could eliminate?</p></div>`},
{d:16,title:"Scenario & sensitivity analysis",phase:3,pillar:"fm",tags:["fm"],time:"50 min",content:`<h2>Scenario & sensitivity analysis — planning for multiple futures</h2><div class="mod-meta">Phase 3 · Day 16 · Financial Modelling · 50 min</div><p>A single-point forecast is a lie. Not because you're dishonest — because the future is inherently uncertain, and presenting one number as if it's a precise prediction misleads decision-makers into false confidence. Scenario analysis replaces the single number with a range of plausible futures. Sensitivity analysis identifies which assumptions matter most. Together, they transform demand planning from prediction into risk management.</p><h3>The three-scenario framework</h3><p><strong>Base case:</strong> Your honest best estimate of the most likely outcome. Not optimistic, not pessimistic — genuinely your central view. Target probability: ~55–65%.</p><p><strong>Upside case:</strong> A plausible positive scenario — not the best case in the universe, but the realistic upside if things go better than expected. Typically 15–25% above base on volume. Target probability: ~20%.</p><p><strong>Downside case:</strong> A plausible negative scenario — the realistic downside if things go worse than expected. Typically 15–25% below base. Target probability: ~15–25%.</p><p><strong>Critical principle:</strong> Each scenario must be driven by specific named assumptions — not just percentage adjustments. "Upside: Lebaran campaign runs as planned AND new store opens on schedule AND no major competitive launch" is a scenario. "Upside: volume +20%" is not — it's just a sensitivity test dressed up as a scenario.</p><h3>Building scenarios in Excel: data tables</h3><div class="callout c-formula"><h4>One-variable data table — how to build it</h4><p>1. Set up your model with a key input cell (e.g., B2 = volume units).<br/>2. In a column nearby, list the values you want to test: 20000, 22000, 24000, 26000, 28000, 30000.<br/>3. In the row above those values, link to your output formula (e.g., =gross_margin_cell).<br/>4. Select the range, go to Data → What-If Analysis → Data Table.<br/>5. Enter B2 as the "column input cell." Excel fills in the output for each scenario automatically.</p><p>For a two-variable table (e.g., test both volume and ASP simultaneously): arrange row headers as one variable, column headers as the other, and specify both input cells.</p></div><h3>Sensitivity analysis: what matters most?</h3><p>Sensitivity analysis asks: if assumption X changes by 1%, how much does the output change? Assumptions with the highest sensitivity deserve the most management attention — they're the ones where being wrong has the biggest financial impact.</p><p>Typical sensitivity ranking for retail demand planning:</p><ol><li><strong>Volume</strong> — usually most sensitive. 10% volume change drives proportional revenue change and a larger proportional profit change.</li><li><strong>Average Selling Price</strong> — highly sensitive because it affects both the top line and gross margin simultaneously. Markdowns are particularly damaging.</li><li><strong>COGS per unit</strong> — sensitive, especially for imported products subject to currency movements or commodity price changes.</li><li><strong>Promotional uplift</strong> — uncertain and impactful. A promotion that performs at 50% of expected uplift can swing the quarterly P&L significantly.</li></ol><div class="callout c-case"><h4>Case study: The scenario analysis that prevented a bad decision</h4><p>A brand manager at a Kanmo brand wanted to run an aggressive Lebaran promotion — 30% price reduction on the full range for 3 weeks. She projected 80% volume uplift. The demand planner built three promotional uplift scenarios: 80% (brand manager's estimate), 50% (planner's estimate based on comparable promotions), and 30% (conservative estimate).</p><p>The results: at 80% uplift, the promotion was revenue-positive and margin-neutral. At 50%, revenue increased slightly but gross margin dropped 3 points. At 30%, the promotion was both revenue-negative AND margin-negative — it was destroying value.</p><p>The brand manager, who had never seen the downside modelled explicitly, agreed to a smaller discount (20% instead of 30%) that was profitable across all three scenarios. The promotion ran, performed close to 50% uplift, and was considered a success. Without scenario analysis, the 30% discount would likely have run at a loss.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Build a 3-scenario demand and P&L model for one Kanmo brand for one quarter. Base: 30,000 units, ASP Rp 420,000, COGS Rp 168,000/unit, OPEX Rp 1.2B. Upside: +20% volume, ASP unchanged. Downside: −20% volume, additional markdown of 10% on 40% of units to clear excess stock.</p><p>(1) Calculate Revenue, Gross Profit, Gross Margin%, and EBITDA for all three scenarios. (2) Build a sensitivity table showing gross margin% as volume varies from −30% to +30% in 10% increments. (3) At what volume level does EBITDA = 0? (4) Write a 3-sentence narrative for each scenario as you'd present it verbally to the CFO. (5) Based on this analysis, what is the single most important risk to manage for this brand this quarter?</p></div>`},
{d:17,title:"Variance analysis",phase:3,pillar:"fm",tags:["fm"],time:"45 min",content:`<h2>Variance analysis — explaining what actually happened</h2><div class="mod-meta">Phase 3 · Day 17 · Financial Modelling · 45 min</div><p>Every month, somewhere in every retail company, someone is trying to explain why actual results differed from the plan. Variance analysis is the discipline of decomposing that gap into its component causes — volume, price, mix — so management understands what happened and what to do about it. As a BA who lives at the intersection of forecasting and financial planning, your ability to do this clearly and quickly is one of the most visible skills you'll demonstrate.</p><h3>Volume variance</h3><div class="callout c-formula"><h4>Formula & example</h4><p>Volume Variance (Revenue) = (Actual Units − Budget Units) × Budget ASP</p><p>Budget: 10,000 units at Rp 350,000. Actual: 8,500 units at Rp 350,000 (assume ASP unchanged for now).<br/>Volume Variance = (8,500 − 10,000) × 350,000 = −1,500 × 350,000 = <strong>−Rp 525M (unfavorable)</strong></p></div><h3>Price variance</h3><div class="callout c-formula"><h4>Formula & example</h4><p>Price Variance = (Actual ASP − Budget ASP) × Actual Units</p><p>Actual ASP = Rp 370,000 (higher than budget due to premium mix). Actual units = 8,500.<br/>Price Variance = (370,000 − 350,000) × 8,500 = 20,000 × 8,500 = <strong>+Rp 170M (favorable)</strong></p><p>Total Revenue Variance = −525M + 170M = <strong>−Rp 355M</strong></p><p>Insight: you sold fewer units than planned, but at a higher price. Net result is still negative — volume loss was larger than price gain.</p></div><h3>Mix variance</h3><p>Mix variance occurs when you sell a different <em>blend</em> of products than planned, and different products have different margins. Even if total volume and average price match the budget, gross margin can miss because you sold more low-margin products and fewer high-margin ones. Mix variance is frequently ignored and frequently significant.</p><h3>The gross profit bridge</h3><p>The "bridge" format presents variance analysis as a waterfall — starting from budget gross profit, adding or subtracting each component as a step, and landing at actual gross profit. This format is far more useful for management communication than a two-column budget/actual table because it shows the pathway from expected to actual, making the contribution of each driver immediately visible.</p><div class="callout c-formula"><h4>Full gross profit bridge</h4><p>Budget Gross Profit<br/>+ Volume variance (at budget margin per unit)<br/>+ Price variance (price change on actual units × margin impact)<br/>− COGS variance (unit cost change × actual units sold)<br/>= Actual Gross Profit</p></div><h3>Writing a variance commentary that actually gets read</h3><p>Numbers describe what happened. Commentary explains why and what it means. Good variance commentary is:</p><ul><li><strong>Specific, not vague.</strong> "Sales were below plan" is not commentary. "Sales were 15% below plan, driven primarily by 3 underperforming stores in the West Java cluster which opened 6 weeks behind schedule with insufficient initial stock" is commentary.</li><li><strong>Causal.</strong> Don't describe the variance — explain the root cause. The reader can see the numbers. They need you to interpret them.</li><li><strong>Quantified.</strong> "Partially offset by strong online performance" is imprecise. "Partially offset by 23% above-plan online sales, contributing +Rp 180M favorable variance" is precise.</li><li><strong>Forward-looking.</strong> What does this variance imply for next month? What action is being taken?</li></ul><div class="callout c-case"><h4>Case study: The commentary that changed a relationship</h4><p>A BA inherited a monthly variance commentary process from her predecessor. The commentary was a two-column table: Budget, Actual. No explanation, no causes, no actions. She rewrote it as a one-page narrative with a bridge chart and three-sentence explanations per major driver, plus an "implication for next month" section.</p><p>The CFO's response to her first version: "This is the first time I've understood the monthly performance report in two years." She had turned a passive data report into an analytical asset — without changing any underlying numbers. The relationship with Finance, which had been distant, became one of her strongest alliances within two months.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Last month for a Kanmo brand: Budget = 12,000 units at ASP Rp 395,000, COGS Rp 158,000/unit. Actual = 10,500 units at ASP Rp 415,000, COGS Rp 162,000/unit.</p><p>(1) Calculate Budget Revenue, Actual Revenue, and total Revenue Variance. (2) Decompose the revenue variance into Volume Variance and Price Variance. (3) Calculate Budget Gross Profit, Actual Gross Profit, and Gross Profit Variance. (4) Decompose the GP Variance into volume effect, price effect, and COGS effect. (5) Write a 4-sentence variance commentary as you'd send it to your manager — include a likely hypothesis for why COGS increased, and one forward implication for next month's plan.</p></div>`},
{d:18,title:"KPI dashboards",phase:3,pillar:"dp",tags:["dp","ai"],time:"45 min",content:`<h2>KPI dashboards — making data visible and actionable</h2><div class="mod-meta">Phase 3 · Day 18 · Demand Planning · 45 min</div><p>A forecast that lives in a spreadsheet nobody opens is operationally useless. A variance analysis buried in a 40-tab Excel file is practically unreadable. Dashboard design — deciding what to show, to whom, at what frequency, in what format — transforms raw data into decisions. Done well, a demand planning dashboard is the difference between a team that reacts to problems and one that prevents them.</p><h3>Three questions before you open any tool</h3><ol><li><strong>Who is the audience?</strong> A warehouse operations dashboard looks nothing like a CFO dashboard. Know who reads it and what decision they need to make.</li><li><strong>What is the single most important question this dashboard must answer?</strong> Not ten questions — one. "Are we on track to hit the quarterly plan?" or "Which SKUs need purchasing action this week?" Dashboards that try to answer fifteen questions answer none of them well.</li><li><strong>What action should the reader take after seeing it?</strong> If the dashboard doesn't lead to a specific action, it's decoration. Design backward from the decision.</li></ol><h3>The 5 demand planning KPIs your dashboard must show</h3><p><strong>1. Forecast accuracy (WMAPE by category):</strong> Core performance metric. Show as a 6–12 month trend to reveal whether you're improving. Break down by category to identify where accuracy problems concentrate.</p><p><strong>2. Forecast bias:</strong> Often overlooked but critical. A bias that's been positive for 3 consecutive months means you're building systematic excess inventory. Show as a trend line — it catches systematic drift before it becomes a crisis.</p><p><strong>3. Days of Inventory Outstanding (DIO) by brand:</strong> Flags brands above target DIO (overstock risk) and below minimum DIO (stockout risk). Traffic light coloring makes status instantly readable without reading every number.</p><p><strong>4. Stockout rate:</strong> % of SKUs out of stock at any point in the period. High stockout rates signal under-forecasting, under-stocking, or supply failures. Track at store level to reveal geographic patterns.</p><p><strong>5. Sell-through rate by brand:</strong> % of received inventory sold. Compare to plan and prior year to identify brands moving slower or faster than expected. A sell-through rate that's running 10 points below plan in week 3 is an early warning of potential markdown exposure at end of season.</p><h3>Choosing the right visualization</h3><p><strong>Trend over time:</strong> Line chart. Always. Bar charts for time series are harder to read for patterns.</p><p><strong>Comparison between categories:</strong> Horizontal bar chart, sorted by value. Easier to read labels and compare magnitudes than vertical bars.</p><p><strong>Current status vs target:</strong> Large metric card with target shown explicitly. "85% / target 90%" in a bold font is instantly readable.</p><p><strong>Exception flagging:</strong> Traffic lights (RAG — Red/Amber/Green) for status. Spark lines for trend. Data bars for magnitude comparison. The goal is to enable a 60-second scan that identifies what needs attention today.</p><p><strong>Tables:</strong> Only for data users need to look up specific values. Never as the primary communication device for an executive audience.</p><h3>Power BI vs Excel for dashboards</h3><p><strong>Excel dashboards:</strong> Faster to build, more flexible, familiar to all stakeholders. Best for monthly reports, ad hoc analysis, and situations where data is refreshed manually. Build your first dashboard in Excel — get it working and adding value, then propose Power BI when you understand the data landscape.</p><p><strong>Power BI:</strong> Connected to live data sources, automatic refresh, interactive filtering. Best for operational dashboards that need to reflect current status daily or weekly. Requires IT cooperation to connect to the ERP. Worth the investment once your analytical approach is validated and you know exactly what needs to be tracked.</p><div class="callout c-case"><h4>Case study: One chart that changed a conversation</h4><p>A demand planner spent three months presenting detailed data tables in the S&OP pack proving that the company was systematically over-forecasting premium categories and under-forecasting value categories. Every month, nobody acted on it.</p><p>She changed her approach: one scatter chart. Y-axis: forecast bias. X-axis: product category. Each bubble: a brand/category combination. The premium categories all clustered in positive bias territory. The value categories clustered in negative bias territory. The pattern was visually unmistakable in 3 seconds.</p><p>In the next S&OP meeting, the CEO looked at the chart for 10 seconds and said "We need to fix this." The same information had been in every report for three months — but only when visualized did it become actionable. The lesson: the problem wasn't the data. It was the format.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Design two dashboards:</p><p><strong>Dashboard 1 — Weekly operational (for you and your team):</strong> Purpose: identify which SKUs need action this week. Describe the layout, the 4 KPIs shown, how exceptions are flagged, and what specific action each red flag should trigger.</p><p><strong>Dashboard 2 — Monthly executive (for S&OP with CFO and brand managers):</strong> Purpose: answer "are we on track for the quarter?" Describe: the 3 charts you'd include, the single most prominent number, and the one question it definitively answers. For each dashboard, explain your chart type choices and why they serve the audience better than alternatives.</p></div>`},
{d:19,title:"Cross-functional communication",phase:3,pillar:"90d",tags:["90d","dp"],time:"45 min",content:`<h2>Cross-functional communication — influencing without authority</h2><div class="mod-meta">Phase 3 · Day 19 · First 90 Days Framework · 45 min</div><p>You will spend a significant portion of your working life trying to get people who don't report to you to do things that serve the organization's goals. This is the defining challenge of demand planning: you depend on Sales for market intelligence, Marketing for campaign plans, Finance for budget alignment, Operations for supply data — and none of them are accountable to you. The ability to influence cross-functional stakeholders is not a soft skill. It is the central professional competency of your role.</p><h3>Understanding what each function actually cares about</h3><p><strong>Sales / brand commercial managers:</strong> Care about hitting their revenue target and having enough inventory to support campaigns. Will often push for higher forecasts to ensure stock availability. Will resist forecasts they believe constrain their ability to sell. Their metric is revenue and sell-through. Speak in their language: "This forecast gives you 95% probability of having sufficient stock through peak season."</p><p><strong>Marketing:</strong> Care about campaign performance and ROI. Want the demand plan to fully reflect promotional investment. May over-estimate uplift because their credibility depends on campaigns appearing successful. Treat their uplift estimates as hypotheses to test, not facts to accept.</p><p><strong>Finance:</strong> Care about working capital and gross margin. Skeptical of optimism that leads to excess inventory. Will push for lower DIO. Natural ally against over-forecasting. Speak in their language: DIO, gross margin%, working capital impact.</p><p><strong>Supply chain / operations:</strong> Care about execution reliability. Want forecasts to be stable — frequent last-minute changes create operational chaos. Will resist revisions even when justified. Build their trust and they'll tell you about supply constraints before they become crises.</p><h3>The one-page brief</h3><p>For most cross-functional communications, the one-page brief is the right format. It forces you to distill complex analysis into a decision-ready summary. Proven structure:</p><ol><li><strong>Situation (2–3 sentences):</strong> Current state. Ground the reader in what they need to know.</li><li><strong>Finding (2–3 sentences):</strong> What does your analysis show? The insight, not the methodology.</li><li><strong>Implication (2–3 sentences):</strong> What does this mean for the business? What decision does it require?</li><li><strong>Recommendation (1–2 sentences):</strong> What do you think should happen, and by when?</li><li><strong>What you need (1 sentence):</strong> The specific input, approval, or action you need from the reader.</li></ol><h3>Handling forecast disagreement gracefully</h3><p>Common scenario: you forecast 45,000 units. Sales says it should be 65,000. You think they're wrong. What do you do?</p><p>Things that don't work: caving immediately (destroys your credibility), digging in rigidly (destroys the relationship), passive-aggressively accepting the number while making clear you disagree (undermines trust), immediately escalating to your manager (burns political capital).</p><p>What works:</p><ul><li><strong>Ask for the reasoning.</strong> "Can you help me understand what's driving 65K? I want to make sure I'm not missing something." This shows openness and often surfaces real market intelligence you didn't have.</li><li><strong>Share your assumptions explicitly.</strong> "My 45K is based on last year's comparable promotion performing at 28% uplift. If you're expecting higher this year, what's different?" This moves the discussion from whose number is right to which assumptions are right — a much more productive conversation.</li><li><strong>Propose a shared resolution framework.</strong> "What if we go with 52K as our consensus, and we agree to track sell-through daily in the first week with a defined trigger to revise the supply plan if we're running significantly above or below?" This creates shared accountability for the outcome.</li></ul><div class="callout c-case"><h4>Case study: Turning an opponent into a partner</h4><p>A demand planner had a chronically adversarial relationship with the brand manager for the company's largest brand. Every S&OP, the brand manager challenged her forecast, argued for higher numbers, and occasionally went to the CEO to override the plan.</p><p>She tried a different approach: invited him to a working session before the next S&OP. She shared her full model, walked through every assumption, and explicitly asked him to challenge any assumption he disagreed with. She incorporated his market intelligence adjustments — some of which genuinely improved the forecast.</p><p>In the actual S&OP meeting, she presented the consensus forecast as a joint product: "Based on the statistical baseline and the commercial intelligence from [his name], we're recommending..." He defended the demand plan instead of challenging it. The forecast that cycle was among the most accurate of the year. By making him a co-author, she removed his incentive to undermine the plan.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write three complete cross-functional communications — ready to send, not templates:</p><p>(1) A one-page brief to the CFO explaining why Q2 gross margin will be 2 percentage points below budget, with a specific recommendation to prevent it worsening in Q3. (2) A Slack message to the Marketing Director requesting the confirmed promotion calendar, explaining specifically why you need it by a date, and what the consequence is if you don't receive it. (3) An email to the Justice brand commercial manager explaining that your back-to-school forecast is 15% below their commercial target, requesting a meeting to discuss assumptions, and proposing a specific approach to reaching consensus.</p></div>`},
{d:20,title:"Manage perceptions & visibility",phase:3,pillar:"90d",tags:["90d"],time:"40 min",content:`<h2>Managing perceptions — being good isn't enough</h2><div class="mod-meta">Phase 3 · Day 20 · First 90 Days Framework · 40 min</div><p>Your actual performance and your perceived performance are different things, and they don't automatically converge. You can do excellent analytical work that nobody notices while a colleague of lesser capability who communicates well gets more recognition, more resources, and more opportunity. This isn't unfair — it's a natural consequence of the fact that organizations run on information, and the information your manager has about you comes from what you communicate, not from the raw quality of your work.</p><p>Managing perceptions is not spin or politics. It is ensuring that the value you create is visible to the people who need to see it, communicated in a way they can understand and act on.</p><h3>The weekly manager update</h3><p>Never let your manager wonder what you've been doing. The most effective tool: a short, regular written update. Weekly at first; fortnightly once the relationship is established.</p><p><strong>Structure that works:</strong></p><ul><li><strong>Wins this week (3–5 bullets):</strong> What did you accomplish? Be specific and connect to business impact. "Worked on the forecast" is not a win. "Completed Q3 Lebaran volume forecast for all 4 brands — ready for Friday's demand review" is a win.</li><li><strong>Working on next week (2–3 bullets):</strong> Your forward priorities. This allows your manager to redirect before you've invested time in the wrong direction.</li><li><strong>Blockers (if any):</strong> Flag issues early rather than failing to deliver and explaining afterwards.</li><li><strong>Decisions needed (if any):</strong> Is there anything requiring your manager's input? Making this explicit saves everyone time.</li></ul><p>Keep it to half a page. Your manager needs to know the highlights and whether anything requires their attention — not a complete diary of your week.</p><h3>Creating visibility through deliverables, not talking</h3><p>The most sustainable form of visibility is work that speaks for itself repeatedly. A well-designed monthly dashboard that leadership references constantly is visible every month long after you built it. A process improvement that saves the team 4 hours per week is visible every week. An analysis that correctly predicted a risk and enabled a good decision is visible every time that decision is discussed.</p><p>When identifying early wins, think deliberately about which create ongoing visibility versus which are one-time recognition moments. Ongoing visibility is worth more.</p><h3>Managing up: giving your manager what they need before they ask</h3><p>Managing up is not flattery. It is making your manager's job easier by anticipating their needs proactively. Things managers universally need but rarely ask for:</p><ul><li><strong>A heads-up before bad news becomes a crisis.</strong> "The Q3 forecast for Brand X is tracking 20% below plan at week 4. I don't think we're in crisis yet, but I wanted to flag it before the monthly review so you're not surprised in the meeting."</li><li><strong>A prepared answer to the question their boss will ask.</strong> "Given the Lebaran forecast is above plan, the CEO will likely ask about working capital implications. I've prepared a one-pager on that if you'd like it for Monday's meeting."</li><li><strong>A recommendation, not just analysis.</strong> "Here's the variance analysis. My recommendation is option B — here's the one-paragraph rationale."</li></ul><div class="callout c-watkins"><p>"Your success depends partly on your ability to manage your boss's perception of your progress. Be proactive, not reactive. Never let them be surprised by something you knew about."</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write two things:</p><p>(1) Your first weekly manager update, as if you'd just finished your first week at Kanmo. Include: 3 specific accomplishments (learning-focused is fine), 3 priorities for next week, 1 blocker or question, and 1 observation about the demand planning function that might be worth a conversation. Under 250 words.</p><p>(2) A personal visibility plan for your first 90 days: the 2–3 specific deliverables you want to be known for, how you'll ensure they reach the right people, and your communication cadence with your manager. How will you calibrate the cadence based on their communication preferences (from your Day 7 conversation)?</p></div>`},
{d:21,title:"Prompt engineering for analysts",phase:3,pillar:"ai",tags:["ai"],time:"50 min",content:`<h2>Prompt engineering — using AI as your thinking partner</h2><div class="mod-meta">Phase 3 · Day 21 · AI & Automation · 50 min</div><p>The demand planners who will perform at a qualitatively different level over the next five years are the ones who learn to use AI tools effectively — not as replacements for judgment, but as accelerators for writing, analysis, and research. Prompt engineering is the practical skill that makes this possible. These are prompts you'll use in your actual work at Kanmo, starting in month one.</p><h3>How LLMs work — enough to use them well</h3><p>Language models like Claude predict the most useful next text given everything that came before. This makes them excellent at reasoning, synthesis, structuring, and generating — and less reliable at precise numerical calculation or factual recall of specific recent events. Use AI for <strong>thinking and writing</strong>. Use Excel for calculation. Use your own judgment for consequential decisions.</p><h3>The four components of a great prompt</h3><p><strong>Role:</strong> Tell it who it is. "You are a demand planning analyst at a multi-brand Indonesian retail group." This contextualizes every output.</p><p><strong>Context:</strong> Give it the specific information it needs. "We are preparing for Lebaran season. The brand has 3 months of data showing 15% upward trend. Lebaran falls 6 weeks from now. Last year's promotional uplift was 28%."</p><p><strong>Task:</strong> Be specific. "Write a 2-paragraph variance commentary explaining why forecast accuracy was below target last month and what action is being taken."</p><p><strong>Format:</strong> Specify the output. "Use a short paragraph for the situation and bullet points for actions. Maximum 200 words. Formal but not stiff tone."</p><h3>Prompt templates for your demand planning work</h3><div class="callout c-formula"><h4>Template 1: Variance commentary generator</h4><p>You are a BA demand planner at Kanmo Group, a multi-brand retail/lifestyle company in Indonesia. Here is this month's performance data: [paste your variance table]. Forecast was [X] units, actual was [Y] units ([Z%] variance). Known contributing factors: [list 2–3 factors you've identified].</p><p>Write a 3-paragraph variance commentary for the CFO: Para 1 = what happened and magnitude. Para 2 = primary causes with specifics. Para 3 = implication for next month's plan and action being taken. Clear, direct language. No jargon. Maximum 250 words.</p></div><div class="callout c-formula"><h4>Template 2: Stakeholder briefing</h4><p>You are preparing a one-page briefing for the monthly S&OP meeting at Kanmo Group. Audience: CFO and brand commercial managers — business-oriented, not analytically technical. Key finding: [your finding]. Key numbers: [paste your numbers].</p><p>Structure: (1) one-sentence situation summary, (2) key finding in plain language, (3) financial implication, (4) recommended action with timeline, (5) what you need from the audience. Maximum 200 words. Professional but direct tone.</p></div><div class="callout c-formula"><h4>Template 3: Scenario framing</h4><p>I am building a demand scenario analysis for [brand] ahead of [Lebaran / back-to-school / year-end]. Base assumptions: [list them]. Define upside and downside scenarios for me. For each: (1) 3 specific assumptions that would drive that outcome, (2) estimated volume impact as % of base, (3) the real-time signal that would tell me we are moving toward that scenario.</p></div><div class="callout c-formula"><h4>Template 4: Concept explainer</h4><p>I am a BA Associate Manager at a multi-brand retail group in Indonesia, responsible for demand planning. I want to understand [specific concept]. Explain it assuming strong analytical background but limited demand planning experience. Include a worked example with realistic Indonesian retail numbers (use Rupiah). Then give me 3 questions I should be asking in practice to apply this well.</p></div><h3>Chain-of-thought prompting</h3><p>For complex problems, add "Think through this step by step before answering" or "First identify all relevant factors, reason through each, then give your conclusion." This technique measurably improves analytical reasoning quality. It forces the model to work through the problem rather than jumping to the most statistically likely answer.</p><h3>When not to use AI</h3><ul><li>For precise numerical calculations — use Excel</li><li>For conclusions you'll present as established facts without verifying</li><li>For anything involving confidential company data sent to external tools without IT clearance</li><li>As a replacement for your own judgment on consequential decisions</li></ul><div class="callout c-task"><h4>Today's task</h4><p>Write 4 complete, ready-to-use prompts for your first 90 days at Kanmo. Each must be specific to your role — not generic. Include: (1) a variance commentary prompt with realistic example numbers, (2) a stakeholder briefing prompt for a specific scenario you can imagine happening, (3) a learning accelerator prompt for a concept you're still uncertain about, and (4) one prompt of your own choosing for a real recurring task. Save these as your personal prompt library in Notes — you'll use them starting month one.</p></div>`},
{d:22,title:"Workflow automation",phase:3,pillar:"ai",tags:["ai"],time:"50 min",content:`<h2>Workflow automation — making the machine do the routine work</h2><div class="mod-meta">Phase 3 · Day 22 · AI & Automation · 50 min</div><p>The average demand planner spends 40–60% of their time on tasks that a well-designed automation could handle in seconds: pulling data from ERP exports, consolidating files across brands, formatting reports, sending update emails. Every hour spent on mechanical tasks is an hour not spent on the analysis and judgment that only a human can provide. Automation is not a luxury — it's a practical skill that makes you immediately more effective.</p><h3>What's worth automating: three criteria</h3><ol><li><strong>High frequency:</strong> The task happens regularly — daily, weekly, monthly. A once-a-year task is rarely worth automating.</li><li><strong>Rule-based:</strong> The task follows consistent, describable rules. "Take the weekly sales file, sum by SKU, compare to last week, flag anything that moved >20%." If it requires case-by-case judgment, automation can assist but not replace.</li><li><strong>Time-consuming:</strong> At least 30–60 minutes per occurrence. Automating a 5-minute task rarely justifies the build time.</li></ol><h3>Tool options — no coding required</h3><p><strong>Microsoft Power Automate:</strong> If Kanmo uses Microsoft 365 (likely), Power Automate is already available at no additional cost. Connects Excel, Outlook, SharePoint, and Teams natively. Best for: scheduled reports via email, threshold-triggered alerts from spreadsheet data, moving files between SharePoint folders based on rules.</p><p><strong>Make.com (formerly Integromat):</strong> Cloud-based visual workflow tool. Better for simpler workflows connecting multiple external services. Good for: Google Sheets to email, connecting two SaaS tools, simple data pipelines that don't involve Microsoft products.</p><p><strong>n8n:</strong> Open-source, more powerful for complex logic, can be self-hosted. Better for advanced workflows requiring custom processing between steps. Good for: multi-step data transformations, workflows with conditional branches, connecting to systems via API.</p><h3>Five high-value automations for demand planning at Kanmo</h3><p><strong>1. Weekly sales consolidation (saves ~90 min/week):</strong> Every Monday, ERP sales reports for each brand land in a shared folder. Automation: trigger on new file arrival → pull data into master template → run quality checks (missing data, implausible values) → send summary email with flagged exceptions. Manual time: 90 min. Automated time: ~3 min review of the exception email.</p><p><strong>2. Stockout risk alert (prevents lost sales):</strong> Weekly script calculates projected inventory coverage (current stock ÷ average weekly sales) for every active SKU. Any SKU with coverage below lead time + safety stock automatically triggers an alert email to you and the relevant supply chain contact with recommended action. Cost of building: 4 hours. Value of preventing one peak-season stockout: many multiples more.</p><p><strong>3. Forecast accuracy report (saves ~45 min/month):</strong> Monthly script takes the previous month's forecast file and actual sales file, calculates MAPE, WMAPE, and bias at SKU/category/brand level, and generates a formatted accuracy report for the S&OP meeting. Eliminates the manual matching and calculation step entirely.</p><p><strong>4. Budget vs actual weekly update (eliminates WhatsApp interruptions):</strong> A weekly auto-email to each brand manager showing YTD actual vs budget, current forecast vs budget, and traffic light status. Brand managers stop asking you informally. You stop context-switching.</p><p><strong>5. New product setup validation (prevents downstream errors):</strong> Daily check scanning new SKU setups against a rules database — correct cost codes, size ratio completeness, product category assignment. Flags failures to both the demand planner and the person who created the SKU before errors compound in the ERP.</p><div class="callout c-case"><h4>Case study: 4 hours of build, saved forever</h4><p>A BA analyst built a Power Automate workflow in one afternoon. Every Friday at 5pm, it pulled data from a SharePoint folder, refreshed a pre-built Excel model via Power Query, and emailed a formatted weekly performance summary to 12 stakeholders automatically. Previously: 2.5 manual hours every Friday. After: 0 hours (just review the output).</p><p>Over a year, the automation saved 130 hours — more than 3 full working weeks. She invested the time in deeper analysis. Her manager noticed the improved output quality. She was promoted within 18 months. The ROI calculation: 4 hours to build, 130 hours saved in year one.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Design 2 automation workflows for your demand planning role at Kanmo. For each:</p><p>(1) The specific problem it solves. (2) The trigger — what starts the workflow? (3) Each step the workflow takes — describe in plain language. (4) The output — what does it produce? (5) Who receives it and what action do they take? (6) Estimated time saved per week or month. (7) Which tool you'd use and why. (8) What could go wrong, and how you'd handle it?</p><p>Make these specific and realistic — not hypothetical. Ground them in the actual weekly tasks a demand planner performs.</p></div>`},
{d:23,title:"Building an AI demand planning assistant",phase:3,pillar:"ai",tags:["ai"],time:"50 min",content:`<h2>Building an AI demand planning assistant — your first real AI project</h2><div class="mod-meta">Phase 3 · Day 23 · AI & Automation · 50 min</div><p>Today is build day — conceptually. By the end of this module you'll have a clear, executable design for an AI tool you could realistically build in your first 90 days at Kanmo: a demand planning assistant that takes your weekly data, generates structured analysis, writes variance commentary, and flags action items. No specialized AI knowledge required. Claude is your coding partner.</p><h3>What the Anthropic API is</h3><p>When you use Claude at claude.ai, you're using a consumer interface. The same capability is available as an API — you send a message (a "prompt") with your data and instructions, and you receive a structured response. You can embed this in your own tools, scripts, and applications.</p><p>The simplest possible API interaction: you send a request containing (1) a system prompt with permanent context about your role and company, and (2) a user message with your current data and task. You receive a text response. That's the entire model.</p><h3>The system prompt — giving the AI your business context</h3><p>The system prompt is what transforms a general AI into a Kanmo demand planning specialist. It's a set of instructions that persists across every interaction. A good system prompt for your assistant includes:</p><ul><li><strong>Identity:</strong> "You are a BA analyst for Kanmo Group, a multi-brand retail/lifestyle company in Indonesia operating brands including Kidzoona, Justice, Tous les Jours, and others."</li><li><strong>Domain knowledge:</strong> "You are familiar with Indonesian retail seasonality (Lebaran, back-to-school, year-end), Kanmo's monthly S&OP process, and key demand planning metrics (MAPE, WMAPE, bias, DIO, fill rate)."</li><li><strong>Response format:</strong> "Respond in professional English suitable for internal business reporting. Use Indonesian Rupiah (Rp) for all monetary values. Keep analysis concise — maximum 3 paragraphs unless more detail is explicitly requested."</li><li><strong>Default output structure:</strong> "When given sales performance data, always produce: (1) headline performance summary, (2) key variance drivers, (3) forward implication, (4) recommended action."</li></ul><h3>Architecture of the demand planning assistant</h3><p><strong>Layer 1 — Data input:</strong> You paste weekly sales data, or a script pulls it automatically from your data source (CSV export, SharePoint file, ERP extract).</p><p><strong>Layer 2 — AI processing:</strong> Data is sent to the Anthropic API along with your system prompt and a task-specific user prompt. The API returns structured analysis.</p><p><strong>Layer 3 — Formatted output:</strong> The response is formatted as a structured report — variance commentary, exception flags, recommended actions — ready to send to stakeholders or use as a high-quality draft.</p><h3>Using Claude as your coding partner</h3><p>You don't need to learn to code before building this. You need to learn to <em>direct</em> coding — a different skill. The process:</p><ol><li>Describe what you want in plain English: "I want a Python script that reads a CSV with columns [brand, SKU, week, forecast, actual], calculates MAPE and bias for each brand, identifies the 5 highest-variance SKUs, then sends that analysis to the Anthropic API and returns a formatted variance commentary."</li><li>Claude writes the code. You review it to check it does what you described — not to understand every line.</li><li>Test with sample data. When it breaks, paste the error message back to Claude and ask it to fix it.</li><li>Iterate until it works.</li></ol><p>Most people who try this approach have a working prototype within 2–3 hours of their first attempt. The limiting factor is clarity of thought about what you want — not technical skill.</p><h3>Start simple — the MVP principle</h3><p>The most common mistake: over-engineering version one. Build the simplest version that does the core job. Test it. Find out what's actually useful versus what you thought would be useful. Then improve based on real use.</p><p><strong>Minimum viable version:</strong> A prompt template that takes your weekly data (pasted manually) and generates a variance commentary. No coding, no API. Just a very well-designed prompt you use in Claude each week. This alone saves 30–45 minutes per week and produces better commentary than most people write manually.</p><p><strong>Version 2:</strong> A Python script that reads the CSV automatically, calculates the metrics, and calls the API. Saves the manual pasting step.</p><p><strong>Version 3:</strong> Add automatic distribution — the report emails itself to stakeholders after you review it.</p><div class="callout c-case"><h4>Case study: The assistant that became a team asset</h4><p>A BA at a Southeast Asian consumer goods company built a simple demand analysis assistant over 3 evenings. It read the weekly actuals file, compared to forecast, and generated structured analysis with exception flags and recommended actions. Total build time: approximately 8 hours, using Claude as the coding partner throughout.</p><p>He shared it with his team of 4 demand planners. Each used it for their own brand. Within a month, collective time on routine reporting dropped 12 hours per week. Commentary quality also improved — the AI consistently produced clearer, more action-oriented summaries than the previous manual approach. At his 6-month review, the tool was cited as evidence of initiative, technical capability, and team impact. He attributed his subsequent promotion largely to it.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write the complete design brief for your Kanmo demand planning assistant — detailed enough that you could hand it to Claude (or a developer) to build:</p><p>(1) Problem statement — what specific pain point does this solve? (2) User — who uses it and how often? (3) Input — what data does it receive, in what format? (4) Processing — what does the AI do with that data? (5) Output — what does it produce, in what format? (6) The complete system prompt you would use. (7) A sample user prompt with realistic example data. (8) Success metrics — how would you know it's working well after 4 weeks? (9) Build plan — what would you do in hour 1, 2, and 3 to get to a working MVP?</p></div>`},
{d:24,title:"Python basics for analysts",phase:3,pillar:"ai",tags:["ai","dp"],time:"55 min",content:`<h2>Python basics for analysts — enough to be genuinely useful</h2><div class="mod-meta">Phase 3 · Day 24 · AI & Automation · 55 min</div><p>You don't need to become a software engineer. You need enough Python to read a file, clean it, do calculations, and produce an output. That's roughly 5–10% of what professional developers know — but it's the 5–10% that unlocks disproportionate analytical capability. With these fundamentals, you can automate weekly data tasks, run forecasting models on thousands of SKUs simultaneously, and build the pipelines that connect your planning systems.</p><h3>Why Python beats Excel for certain tasks</h3><ul><li><strong>Scale:</strong> Excel struggles above ~100,000 rows. Python handles millions of rows without breaking. If Kanmo has thousands of active SKUs across dozens of stores with years of weekly history, Python is the right tool.</li><li><strong>Automation:</strong> Python scripts can be scheduled to run automatically. Excel cannot.</li><li><strong>Reproducibility:</strong> A Python script is documented and replicable. An Excel model with manual steps is neither. Six months from now, "future you" will be glad you wrote the code.</li><li><strong>Advanced analytics:</strong> Machine learning forecasting (Prophet), anomaly detection, optimization — these are only practical in Python.</li></ul><p>Excel remains better for: interactive exploration, sharing with colleagues who don't code, financial models with complex conditional logic, and presentation-ready outputs. They are complementary tools.</p><h3>The core pandas operations — your 80% toolkit</h3><div class="callout c-formula"><h4>1. Load data</h4><p>import pandas as pd<br/>df = pd.read_csv('sales_data.csv')<br/>df = pd.read_excel('sales_data.xlsx', sheet_name='Data')</p></div><div class="callout c-formula"><h4>2. Inspect your data</h4><p>df.head()        # first 5 rows<br/>df.shape         # (rows, columns)<br/>df.dtypes        # data types<br/>df.isnull().sum() # count missing values</p></div><div class="callout c-formula"><h4>3. Filter rows</h4><p>df_justice = df[df['brand'] == 'Justice']<br/>df_july = df[df['month'] == 'July']<br/>df_both = df[(df['brand'] == 'Justice') & (df['month'] == 'July')]</p></div><div class="callout c-formula"><h4>4. Group and aggregate</h4><p># Total sales by brand (like SUMIF)<br/>brand_totals = df.groupby('brand')['actual'].sum()<br/># Monthly average by brand (like pivot table)<br/>monthly = df.groupby(['brand','month'])['actual'].mean()</p></div><div class="callout c-formula"><h4>5. Add calculated columns</h4><p>df['mape'] = abs(df['forecast'] - df['actual']) / df['actual']<br/>df['bias'] = (df['forecast'] - df['actual']) / df['actual']<br/>df['gross_profit'] = (df['asp'] - df['cogs']) * df['units']</p></div><div class="callout c-formula"><h4>6. Merge data (like VLOOKUP)</h4><p># Add product master data to sales data<br/>df_merged = df.merge(product_master, on='sku', how='left')</p></div><div class="callout c-formula"><h4>7. Export results</h4><p>df.to_csv('output.csv', index=False)<br/>df.to_excel('output.xlsx', sheet_name='Results', index=False)</p></div><h3>Prophet — forecasting in 10 lines of code</h3><p>Meta's Prophet library handles exactly the kind of forecasting demand planners do: time series with seasonality, trends, and holiday effects.</p><div class="callout c-formula"><h4>Complete Prophet workflow</h4><p>from prophet import Prophet<br/>import pandas as pd</p><p># Data needs columns 'ds' (date) and 'y' (value)<br/>df = pd.read_csv('weekly_sales.csv')<br/>df.columns = ['ds', 'y']</p><p># Build model with multiplicative seasonality<br/>m = Prophet(seasonality_mode='multiplicative', yearly_seasonality=True)<br/>m.fit(df)</p><p># Forecast 12 weeks ahead<br/>future = m.make_future_dataframe(periods=12, freq='W')<br/>forecast = m.predict(future)</p><p># Output includes point forecast and confidence intervals<br/>print(forecast[['ds','yhat','yhat_lower','yhat_upper']].tail(12))</p></div><p>Prophet auto-detects seasonality and trend. The yhat_lower and yhat_upper columns give you confidence intervals — the range-based forecast that builds stakeholder credibility.</p><h3>Getting started: practical steps</h3><ol><li>Install Anaconda (free) — includes Python, Jupyter notebooks, and pandas.</li><li>Open Jupyter Notebook — browser-based environment, shows inputs and outputs together, ideal for analytical work.</li><li>Start with sample data — download a CSV of fake sales data, load it with pandas, run a few operations. Day one goal: read a file and print a summary.</li><li>Use Claude as your tutor — every time you get stuck, describe what you're trying to do and paste the error. Claude will fix it and explain what went wrong.</li></ol><div class="callout c-task"><h4>Today's task</h4><p>Write out a complete Python workflow for your weekly demand planning process at Kanmo in plain English (pseudocode):</p><p>(1) Data inputs: what files or sources does the script read? (2) Transformations: describe each step the script performs — plain language, not code. (3) Calculations: which metrics does it compute? (4) Outputs: what files, reports, or alerts does it produce? (5) Schedule: when and how often does it run?</p><p>Then: identify the 5 pandas operations from this module you'd use most in this workflow, and write one example of each applied specifically to your Kanmo demand planning context (use realistic column names and brand names). Save in Notes — this becomes the brief you give Claude to write the actual code.</p></div>`},
{d:25,title:"Manage yourself & your energy",phase:3,pillar:"90d",tags:["90d"],time:"40 min",content:`<h2>Manage yourself — the hardest part of any transition</h2><div class="mod-meta">Phase 3 · Day 25 · First 90 Days Framework · 40 min</div><p>Watkins devotes a full chapter to self-management — not because transitions are psychologically catastrophic, but because the conditions of a transition (high uncertainty, high visibility, unfamiliar social dynamics, steep learning curve) systematically impair the judgment of otherwise capable people. Managing yourself well during a transition is a professional competency with direct consequences for your performance.</p><h3>The transition roller coaster</h3><p>Almost everyone who has started a new leadership role reports a similar emotional arc. Knowing it in advance doesn't eliminate the discomfort, but it normalizes it — so when you hit the week 4 dip, you recognize it as a predictable feature of transitions, not a signal that you were wrong to take the role.</p><ul><li><strong>Weeks 1–2:</strong> High energy. Everything is new and interesting. People are welcoming. You feel optimistic.</li><li><strong>Weeks 3–5:</strong> First dip. You've been asking questions for weeks and feel pressure to produce results. You encounter your first organizational obstacle — a resistant stakeholder, a system that doesn't work as described, a process more complex than it appeared.</li><li><strong>Weeks 6–10:</strong> Growing competence, growing awareness of how much you still don't know. The hardest period — you know enough to see the problems but not yet enough to solve them confidently. Imposter syndrome is loudest here.</li><li><strong>Month 3+:</strong> Building momentum. Early wins have accumulated. Relationships are more solid. The work starts to feel more natural.</li></ul><h3>Building your personal advisory board</h3><p>Watkins recommends 3–5 trusted advisors who serve different functions:</p><p><strong>Technical advisors:</strong> People with deep expertise in demand planning, retail analytics, or the specific business context. They help you think through technical problems. A former mentor, a professional contact who's done the role before, or a peer in a similar role at a different company.</p><p><strong>Cultural interpreters:</strong> People who know Kanmo Group specifically. They decode unwritten rules, real power dynamics, and cultural norms you'd otherwise learn through costly mistakes. A former employee, a vendor with deep Kanmo relationships, or an industry contact.</p><p><strong>Political counselors:</strong> People skilled at organizational navigation who can help you think through sensitive stakeholder situations without being caught in them. Usually someone outside Kanmo who has navigated similar organizational complexity.</p><h3>The daily rhythm that protects your best work</h3><p>Without deliberate structure, urgent tasks will always crowd out important ones. A framework for your first 90 days:</p><ul><li><strong>First 60–90 minutes of the day:</strong> Highest-value cognitive work — analysis, model building, writing key deliverables. Do not start with email. Your brain is freshest at the start of the day; don't waste it on inbox processing.</li><li><strong>Mid-morning:</strong> Stakeholder conversations and 1:1 meetings. Brain still sharp but intensive analytical work is done.</li><li><strong>After lunch:</strong> Routine tasks — data pulls, report updates, email responses. These require less focused attention.</li><li><strong>Last 15 minutes of the day:</strong> Daily reflection. Write: one thing you learned, one thing you'd do differently, and your 3 most important tasks for tomorrow. This practice builds self-awareness faster than any other technique and ensures tomorrow starts with clarity, not chaos.</li></ul><h3>The 3 most important things discipline</h3><p>Every morning, before opening your laptop, write down your 3 most important tasks for the day. Not 10. Not 5. Three. These are the tasks that, if you accomplish nothing else, make today a good day. Protect time for them. At the end of the day, check how many you completed.</p><p>This matters most during overwhelming periods — exactly when most people abandon all structure and spend their days reacting to whatever appears in their inbox. The 3-task discipline creates a floor of effectiveness below which you don't fall, no matter how chaotic the day.</p><div class="callout c-watkins"><p>"The life of a leader is always a balancing act, but never more so than during a transition. Managing yourself — your emotions, your energy, your priorities — is a key transition challenge that deserves as much attention as managing your relationships and your work."</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write two things:</p><p>(1) Design your ideal first-week daily routine at Kanmo — hour by hour from waking through end of workday. Account for the commute, the meetings you know will happen, and the social dimension of being new. Where do you protect time for deep analytical work? When do you do stakeholder conversations? What is your end-of-day ritual? Be realistic — not idealized.</p><p>(2) Identify 3 people for your personal advisory board. For each: who they are (role and relationship to you), which function they serve (technical, cultural, or political), and how you would engage them — a monthly call, occasional messages when you need to think something through, or a more structured check-in format?</p></div>`},
{d:26,title:"Demand planning tools landscape",phase:3,pillar:"dp",tags:["dp","ai"],time:"45 min",content:`<h2>Demand planning tools landscape — knowing what exists</h2><div class="mod-meta">Phase 3 · Day 26 · Demand Planning · 45 min</div><p>You don't need expertise in every demand planning tool. You need enough knowledge of the landscape to have credible conversations with vendors and IT, to recognize when the current toolset is inadequate, and to make a compelling business case for improvement when the time is right.</p><h3>The realistic current stack at Kanmo Group</h3><p>Based on the scale and profile of a company like Kanmo, the most likely current tools are: an ERP system (SAP Business One, Oracle NetSuite, or a regional ERP like Microsoft Dynamics) for inventory and purchase order management; Excel-based forecasting models, likely built and maintained by whoever has been responsible for planning; Power BI or a similar BI tool for dashboards and reporting; Microsoft Teams or similar for S&OP collaboration.</p><p>This stack is not unusual or backward. It's what most mid-sized Indonesian retailers use today, and it can be used well or badly. Your job in the first 90 days is to understand exactly how it's being used and where it's limiting performance.</p><h3>The four tiers of demand planning software</h3><p><strong>Tier 1 — Enterprise platforms (SAP IBP, Oracle Demantra, Kinaxis):</strong> Built for very large companies with complex global supply chains. Implementations take 12–24 months and cost hundreds of thousands to millions of dollars. Extremely capable — ML forecasting, full S&OP workflow, deep ERP integration. Not relevant for Kanmo's current scale but important to know exist.</p><p><strong>Tier 2 — Mid-market platforms (Anaplan, Logility, Slim4):</strong> Designed for companies with sophisticated needs but without enterprise scale. Anaplan has strong Southeast Asia adoption. Features: scenario modelling, collaborative S&OP workflows, statistical forecasting with business-user interface. Implementation: 3–6 months. Cost: tens of thousands of dollars per year. This is the tier Kanmo would move into when the Excel approach breaks under scale or complexity.</p><p><strong>Tier 3 — AI-native tools (Relex, o9 Solutions, Algo Retail):</strong> Built from scratch with machine learning forecasting. Relex Solutions has grown rapidly in Southeast Asian retail. These tools handle promotions, new products, and seasonal patterns automatically — things that require manual intervention in traditional tools. Still relatively expensive but increasingly accessible to mid-sized retailers.</p><p><strong>Tier 4 — Excel + Power BI + Python (where you likely are):</strong> Not a tier to be embarrassed about. It's a capable stack if used well. The limitation is scalability and collaboration — as brands, SKUs, and users multiply, the manual nature of Excel-based planning creates bottlenecks that compound over time.</p><h3>When to advocate for a better tool</h3><p>The right time to propose a tool upgrade is when you have evidence the current tool is limiting business performance. Signs that the stack is insufficient:</p><ul><li>Demand planners spend more than 50% of time on data preparation versus analysis</li><li>Forecast accuracy is declining despite improving individual skills — the process is the bottleneck</li><li>New brand or SKU additions create disproportionate manual work</li><li>S&OP requires manual consolidation of multiple Excel files creating version control problems</li><li>Stakeholders complain about the timeliness or accessibility of demand data</li></ul><p>The right way to propose: a business case with numbers. Not "Excel is old-fashioned" — that doesn't move budgets. "Our current process costs 28 analyst-hours per week in data preparation. A Tier 2 platform would reduce this to 8 hours at a cost of Rp X per year, paying back in Y months" — that moves budgets.</p><div class="callout c-case"><h4>Case study: Making the tool case at the right moment</h4><p>A demand planning manager had been arguing for a tool upgrade for 18 months. Consistently told the cost was too high. Nothing moved. After a peak season where two brands experienced simultaneous stockouts, she built a post-mortem: cost of the stockouts (lost sales + air freight emergency replenishment): Rp 4.3 billion. Cost of the proposed Slim4 implementation: Rp 1.8 billion over 3 years. Her one-pager: "One peak season's stockout cost twice what a 3-year software investment would cost." The project was approved within two weeks. Timing and framing matter as much as the quality of the argument.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write a 350-word tools assessment for Kanmo Group's demand planning function, as you'd write it after your first month in the role:</p><p>(1) Current stack: what tools are likely in use and what are their strengths and limitations? (2) Key pain points: where is the current stack creating the most friction for a demand planner's weekly workflow? (3) Recommended next step: what is the most practical improvement possible in the next 6 months — better automation of the existing stack, or a step up to a dedicated tool? (4) Business case framing: how would you quantify the value of improvement in financial terms your CFO would find compelling?</p></div>`},
{d:27,title:"Create alliances across functions",phase:3,pillar:"90d",tags:["90d"],time:"40 min",content:`<h2>Create alliances — the relationships that make the work work</h2><div class="mod-meta">Phase 3 · Day 27 · First 90 Days Framework · 40 min</div><p>You've mapped your stakeholders (Day 6). You've built working relationships through your first 30–60 days. Now — when you have enough context to be useful but are still in relationship-building mode — is the moment to deliberately consolidate the alliances that will define your long-term effectiveness. An alliance is different from a working relationship. A working relationship is transactional. An alliance is mutual investment: I care about your success, you care about mine, and we protect each other when it matters.</p><h3>Why alliances are strategically critical in your specific role</h3><p>Consider your structural situation: you produce a number (the demand forecast) that directly affects the work of 4–5 functions, none of whom report to you. When things go wrong — and in demand planning, things regularly go wrong — the default organizational response is to find someone to blame. Without alliances, that someone is often the demand planner, whose forecast provides a convenient explanation for missed targets regardless of the actual cause.</p><p>With alliances, the dynamic shifts. A Sales manager who trusts you will warn you about a promotion that isn't in the system yet. A Finance partner who sees you as an ally will tell you when the CFO is worried about inventory levels before it becomes a meeting you're not invited to. An Operations manager who values the relationship will call you when a supply problem is developing rather than letting it become a crisis.</p><h3>Building the Sales alliance</h3><p>Sales is both your most important input source and your most common challenger. The structural tension: Sales wants high forecasts to ensure inventory availability; demand planning wants accurate forecasts to prevent excess inventory. These objectives genuinely conflict.</p><p>Three approaches that work:</p><ul><li><strong>Involve them in the process.</strong> A Sales manager who co-creates the forecast is far less likely to challenge it than one who receives it as a completed document.</li><li><strong>Acknowledge their market intelligence explicitly.</strong> When their input improves accuracy, say so publicly. "The promotional uplift estimate from [name] was accurate to within 5% — thank you." People provide more of what they're recognized for.</li><li><strong>Be honest about uncertainty.</strong> A Sales manager who knows you'll tell them honestly when data is ambiguous trusts your forecasts more, not less, than one who suspects you're always certain.</li></ul><h3>Building the Finance alliance</h3><p>Finance is a natural structural ally — both functions care about efficient capital use and avoiding waste. The challenge is that Finance often sees demand planning as a source of optimistic forecasts that drive excess inventory spend.</p><p>What works: learn their language and use it (working capital, DIO, gross margin — not units and accuracy percentages). Come to Finance with questions about their constraints, not just requests: "I want to understand the working capital envelope I should be designing safety stock recommendations around." Share forecast uncertainty explicitly — they'd rather build a financial buffer for uncertainty than be surprised by an inventory write-off.</p><div class="callout c-case"><h4>Case study: The alliance that survived a crisis</h4><p>A demand planner had built a genuinely strong alliance with her main brand commercial manager over 8 months. They had regular informal conversations, shared market intelligence proactively, and had discussed forecast uncertainty and inventory risk honestly several times. During peak season, a supplier quality issue caused 40% of a shipment to be rejected — creating a 3-week supply gap at maximum demand. Organizational pressure built to find a culprit.</p><p>The brand manager publicly defended the demand plan in the executive review: "The demand forecast was right. The inventory plan accounted for the risks we knew about. This was a supply execution failure, not a planning failure." Without the alliance, the stockout would have been attributed to forecast error — which is the default assumption in most retail organizations when something goes wrong.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Choose 3 stakeholders from your Day 6 map. For each, write a complete alliance-building plan:</p><p>(1) The structural tension or potential conflict between your role and theirs. (2) Their primary objective — what do they care about most? (3) What you can offer them that genuinely helps them achieve their objective. (4) What you want from them in return — specifically. (5) A 3-month sequence: what would you do in month 1, month 2, and month 3 to build the relationship progressively?</p><p>Make these specific. "Have coffee and be friendly" is not a plan.</p></div>`},
