*{box-sizing:border-box;margin:0;padding:0}
:root{

  --red:#c8392b;--red-bg:#fdf2f1;
  --blue:#0c447c;--blue-bg:#e6f1fb;
  --green:#27500a;--green-bg:#eaf3de;
  --amber:#633806;--amber-bg:#faeeda;
  --purple:#3c3489;--purple-bg:#eeedfe;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111;--surface:#1c1c1e;--surface2:#2c2c2e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);--text:#f0f0f0;--muted:#aaa;--hint:#555;--red-bg:rgba(200,57,43,0.15);--blue-bg:rgba(12,68,124,0.2);--green-bg:rgba(39,80,10,0.2);--amber-bg:rgba(99,56,6,0.2);--purple-bg:rgba(60,52,137,0.2);}
}
body{font-family:'Lora',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.8;}
.shell{max-width:860px;margin:0 auto;padding-bottom:5rem;}
.topbar{background:var(--text);color:var(--surface);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;font-family:'Syne',sans-serif;}
.brand{font-size:15px;font-weight:700;letter-spacing:-0.3px;}
.brand small{font-size:10px;opacity:0.35;margin-left:8px;font-weight:400;letter-spacing:0.5px;text-transform:uppercase;font-family:'DM Mono',monospace;}
.top-right{display:flex;align-items:center;gap:10px;}
.phase-pill{font-size:9px;padding:3px 9px;border-radius:3px;background:var(--red);color:#fff;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;font-family:'Syne',sans-serif;}
.day-tag{font-size:11px;opacity:0.4;font-family:'DM Mono',monospace;}
.nav{display:flex;background:var(--surface);border-bottom:0.5px solid var(--border2);position:sticky;top:44px;z-index:299;overflow-x:auto;}
.ntab{flex:1;min-width:65px;padding:10px 4px;border:none;background:none;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:0.6px;transition:all .15s;font-family:'Syne',sans-serif;}
.ntab.on{color:var(--red);border-bottom-color:var(--red);}
.ntab:hover:not(.on){color:var(--text);}
.pg{display:none;padding:1.25rem;}.pg.on{display:block;}
.phase-banner{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;}
.pb-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}

.pb-sub{font-size:12px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;}
.pb-pct{font-family:'Syne',sans-serif;font-size:36px;font-weight:700;color:var(--red);}

.t-90{background:var(--red-bg);color:var(--red);}.t-dp{background:var(--blue-bg);color:var(--blue);}.t-fm{background:var(--amber-bg);color:var(--amber);}.t-ai{background:var(--green-bg);color:var(--green);}

<script>
const DAYS=[
{d:1,title:"Why transitions fail",phase:1,pillar:"90d",tags:["90d"],time:"45 min",content:`<h2>Why transitions fail — and how to make yours different</h2><div class="mod-meta">Phase 1 · Day 1 · First 90 Days Framework · 45 min</div><p>Most new managers fail not because they're incompetent — they fail because they're competent in the <em>wrong</em> things. Michael Watkins calls this the <strong>Success Trap</strong>: the habits and instincts that earned you your last promotion are exactly the ones that get you into trouble in a new role. You keep doing what worked before, in a context where it no longer applies.</p><p>As you step into the BA Associate Manager role at Kanmo, you're not just changing companies. You're changing what "doing your job well" actually means — from execution to diagnosis, from individual contribution to cross-functional influence, from a single brand to a multi-brand portfolio.</p><h3>The breakeven point</h3><p>When you join a new role you immediately start <em>consuming</em> value: you take up time with questions, you make decisions with incomplete information, you slow down processes while you learn. You don't start <em>creating</em> net value until you've learned enough to contribute more than you consume. Watkins calls the moment those lines cross the <strong>breakeven point</strong>.</p><p>Research shows the average mid-level manager takes 6.2 months to reach breakeven. Managers who use a structured transition approach reach it roughly 40% faster — around 3.7 months. That's the purpose of this curriculum: compress the learning curve before you walk through the door.</p><div class="callout c-def"><h4>Key concept</h4><p><strong>Breakeven point:</strong> The moment when the value you create for your organization exceeds the value you have consumed. Before breakeven, you are a net drain — even while working hard. Your goal is to reach it as fast as possible without cutting corners on the relationships and learning that make it sustainable.</p></div><h3>The five most common transition failure modes</h3><ol><li><strong>Assuming the new role is like the old one.</strong> You were great at executing before. Your new role may require more diagnosing, influencing, and coordinating. Coming in ready to "do" when the situation demands you "listen" is the most common mistake of all.</li><li><strong>Failing to build relationships before they're needed.</strong> Technical competence gets you the job. Relationships determine how much you can actually get done once you're in it. Managers who spend their first weeks buried in spreadsheets instead of meeting people systematically underperform those who balance both.</li><li><strong>Acting too quickly.</strong> The instinct to prove yourself by moving fast is understandable but dangerous. Decisions made before you fully understand the context often have to be undone — and reversing a decision destroys credibility faster than making no decision at all.</li><li><strong>Not clarifying expectations with your manager.</strong> Most new managers assume they know what's expected. They're almost always wrong in ways that matter. The gap between what you think your boss wants and what they actually want is a trap that catches most people in the first 60 days.</li><li><strong>Neglecting the culture.</strong> Every organization has unwritten rules — how decisions actually get made, who the real influencers are, what gets people quietly sidelined even if it's not a fireable offense. Violating cultural norms, even accidentally, creates adversaries you didn't know you had.</li></ol><h3>What's different about joining Kanmo Group</h3><p>You're not just joining a new company — you're entering a <strong>multi-brand retail group</strong> in a demand planning function. This creates specific challenges worth naming:</p><ul><li>Each brand has its own commercial team, seasonal rhythm, and supplier relationships. You'll need to build relationships across multiple brand teams, not just one.</li><li>Demand planning sits at the intersection of Sales, Marketing, Finance, and Operations. You have no direct authority over any of them. Your effectiveness depends entirely on influence — built through relationships, not titles.</li><li>Retail moves fast. Decisions that wait two weeks have real inventory consequences. You'll feel pressure to have answers before you've built context. Resist it.</li></ul><div class="callout c-watkins"><p>"Joining a new company is akin to an organ transplant — and you're the new organ. If you're not thoughtful about adapting to the new situation, you could end up being attacked by the organizational immune system and rejected."</p></div><div class="callout c-case"><h4>Case study: The demand planner who acted too fast</h4><p>A demand planning manager joined a fashion retailer in Jakarta and, within her second week, identified what she believed was a fundamental flaw in the forecasting model — it wasn't accounting for promotional periods. She built a fix and presented it to the team in week three.</p><p>What she didn't know: the team had tried exactly that fix eighteen months earlier and it had made things worse because of how the ERP system was configured. Her manager had to explain this history. The team saw her as someone who didn't bother to learn before acting. It took four months to rebuild the trust she'd burned in three weeks.</p><p>The irony: her diagnosis was correct. The promotional adjustment genuinely was needed. But by acting without context, she spent the political capital she needed to actually make the change. Two weeks of "what have we tried before?" conversations would have arrived at the same solution with the team's support instead of their skepticism.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write down 3 things you were known for or genuinely good at in your previous role. For each one, answer honestly: (a) Does this skill transfer directly to demand planning? (b) Does this behavior still serve me, or does it need to adapt? (c) What's the version of this strength that fits the new context?</p><p>Save your answers in Notes. Come back to this after your first month at Kanmo and see how accurate your predictions were — the comparison will tell you something important about your self-awareness.</p></div>`},
{d:2,title:"The STARS model",phase:1,pillar:"90d",tags:["90d"],time:"45 min",content:`<h2>The STARS model — read your situation before you act</h2><div class="mod-meta">Phase 1 · Day 2 · First 90 Days Framework · 45 min</div><p>The most important thing you can do before starting a new role is correctly diagnose the situation you're walking into. Watkins' STARS model gives you five distinct situations, each demanding a fundamentally different approach. Get the diagnosis wrong and you'll apply the right strategy in the wrong context — which is often worse than having no strategy at all.</p><h3>The five STARS situations</h3><p><strong>Startup:</strong> Building something from scratch. No established process, no history, high ambiguity. The opportunity is that you get to build things right. The challenge is creating structure while moving fast without a playbook. In demand planning, a Startup looks like: Kanmo has never had a formal demand planning function. You are the first person in this role. There are no existing forecast models, no S&OP process, no accuracy tracking.</p><p><strong>Turnaround:</strong> The function is in visible crisis. Stockouts are frequent, inventory is bloated, forecasts are wildly wrong, and everyone knows something is broken. Your mandate is explicit. People expect and will accept change. The challenge is moving fast while not destroying the parts that do work.</p><p><strong>Accelerated Growth:</strong> The business is growing faster than its processes can keep up. Demand planning exists but is stretched. New brands or markets are being added faster than the team can absorb. Your job is to scale what's working without breaking it.</p><p><strong>Realignment:</strong> The function works adequately but has been drifting. Processes have calcified. Better approaches exist but nobody has pushed for them. This is the trickiest situation because there's no visible urgency — you must create awareness of the need for change before the situation becomes a crisis.</p><p><strong>Sustaining Success:</strong> The function genuinely performs well. Strong metrics, good stakeholder relationships, established processes. Your job is to maintain what's working, find incremental improvements, and develop people. The trap here is feeling you need to change things to justify your role.</p><div class="callout c-def"><h4>Why STARS changes everything</h4><p>In a Turnaround, proposing a new methodology in week two is a credibility builder — action is expected. In a Sustaining Success situation, the same action is a credibility destroyer — you're fixing something that isn't broken. The STARS model is not a personality framework. It's a situational diagnostic that tells you what kind of leadership the context requires.</p></div><h3>Most real situations are blends</h3><p>Kanmo Group is likely a mix of Realignment and Accelerated Growth at the group level, while individual brands may be in different situations. The company is growing its brand portfolio (Accelerated Growth), but the demand planning function may be running on informal Excel processes that haven't scaled (Realignment). One specific brand — perhaps a newer license — might be more like a Startup.</p><p>The practical implication: diagnose each brand's situation individually. Don't assume the approach that works for Brand A is right for Brand B.</p><h3>How to confirm your diagnosis</h3><p>Your initial STARS hypothesis is just that — a hypothesis. Confirm it in your first conversations:</p><ul><li>"What does success in this role look like at 6 months?" — Urgency in the answer signals Turnaround or Realignment. A strategic, thoughtful answer signals Sustaining Success or Accelerated Growth.</li><li>"What's the biggest challenge the demand planning function faces right now?" — If they have a ready answer with specifics, there's a real problem being felt. If they have to think about it, things are probably working reasonably well.</li><li>"What changed in the last 12 months that made this role necessary?" — If the role is new, you're probably in Startup or Accelerated Growth territory.</li></ul><div class="callout c-case"><h4>Case study: Misreading the situation at a multi-brand retailer</h4><p>A supply chain analyst joined a multi-brand group in Southeast Asia as their first dedicated demand planner. She assumed it was a Startup — building from scratch. She spent her first three weeks designing a comprehensive demand planning process and presented it to leadership in week four.</p><p>What she missed: each brand's commercial manager had already developed their own informal forecasting process over years. They weren't waiting for a formal system — they had a system, and they were happy with it. Her proposal was seen as a threat to their autonomy, not a solution to a problem they felt they had.</p><p>The real situation was Realignment. Had she diagnosed correctly, she would have spent the first three weeks learning each brand's existing approach, acknowledged what worked, and proposed a unified process that incorporated the best of each — rather than replacing everything from scratch. The outcome would have been the same tool but with complete buy-in instead of months of resistance.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Based on publicly available information about Kanmo Group — their website, LinkedIn, news coverage — write a 2-paragraph STARS diagnosis. Paragraph 1: what situation do you think the demand planning function is in, and what evidence supports that hypothesis? Paragraph 2: what 3 specific questions would you ask in your first week to confirm or revise this diagnosis? Be specific — not "ask about their challenges" but the exact question you'd ask, and to whom.</p></div>`},
{d:3,title:"Build your learning agenda",phase:1,pillar:"90d",tags:["90d"],time:"50 min",content:`<h2>Build your learning agenda — learn by design, not by accident</h2><div class="mod-meta">Phase 1 · Day 3 · First 90 Days Framework · 50 min</div><p>Most new managers learn reactively — they absorb information as it comes to them. The problem is that what comes to you is controlled by whoever has access to you, not by what you actually need to know. Watkins' solution: build a structured learning agenda before you arrive, organized around the questions that matter most, and work through it systematically in your first 30 days.</p><h3>The three-block structure</h3><p><strong>Block 1 — Questions about the past.</strong> You cannot understand the present without understanding how it got there. The past contains the context for every entrenched behavior, every organizational scar, and every "we tried that before." For a demand planner at Kanmo, past questions include: How has forecast accuracy trended over the last 2–3 years? Has there been a dedicated demand planner before, or is this new? What major inventory problems has the company experienced? What systems or tools have been tried and abandoned?</p><p><strong>Block 2 — Questions about the present.</strong> Current state questions tell you what you're actually working with — the systems, people, processes, and politics. What tools are in use for forecasting and inventory management? How does the S&OP process currently work? Who are the key stakeholders and what are their pain points? Where does the team spend most of its time — data wrangling, analysis, or meetings?</p><p><strong>Block 3 — Questions about the future.</strong> Future questions reveal the organization's ambitions and the gap between where things are and where they need to go. What does excellent demand planning look like for Kanmo in 2 years? Which brands are expected to grow most, and what planning challenges does that create? What would make the biggest difference to forecast accuracy in the next 12 months?</p><div class="callout c-def"><h4>The PROPHET framework for stakeholder interviews</h4><p>When interviewing stakeholders, explore these seven dimensions: <strong>P</strong>erformance (how has it been going?), <strong>R</strong>elationships (who works well together, who doesn't?), <strong>O</strong>rganization (how does the team actually function day to day?), <strong>P</strong>rocesses (how are things actually done vs. how they should be done?), <strong>H</strong>istory (what happened before?), <strong>E</strong>xternal environment (what market forces matter?), <strong>T</strong>alent (who are the key people — formal and informal?)</p></div><h3>How to run a great learning conversation</h3><ol><li><strong>Prepare 3–4 specific questions before each conversation.</strong> Arriving with questions shows respect for the person's time and signals that you take the role seriously.</li><li><strong>Start with context, not your agenda.</strong> "Can you tell me about your role and how it connects to demand planning?" before your prepared questions. This builds rapport and often surfaces information you wouldn't have thought to ask for.</li><li><strong>Ask about failures as much as successes.</strong> "What's been tried that hasn't worked?" is often the highest-value question you can ask. People are usually eager to discuss past frustrations if they believe you're genuinely listening.</li><li><strong>End with: "Is there anything I should know that I haven't asked about?"</strong> This catches the things that don't fit neatly into your predefined questions — which are often the most important things.</li><li><strong>Take notes immediately after, not during.</strong> Note-taking during a conversation can feel like an interrogation and changes what people share.</li></ol><div class="callout c-case"><h4>Case study: The learning agenda that changed a transition</h4><p>A demand planning manager at a consumer goods company in Surabaya built a formal learning agenda before starting. One of her past questions was: "What inventory write-offs has the company taken in the last 2 years, and why?"</p><p>In her second interview — with the finance director — she learned the company had written off Rp 4.5 billion in excess inventory 18 months earlier because a promotional forecast had been massively over-inflated. The CFO was still privately furious and deeply skeptical of the demand planning function as a result. Without the learning agenda, she might not have discovered this for months — by which point she would have made recommendations that re-triggered his skepticism without understanding why.</p><p>Instead, she was able to address it directly: "I heard there was a significant write-off related to a promotional forecast. Can you walk me through what happened from your perspective?" That single question built more trust with the CFO than anything else she did in her first month.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write your personal learning agenda for Kanmo. Three sections — Past, Present, Future — with a minimum of 4 specific questions each. Make them specific to demand planning, not generic new-hire questions. Then: identify the 3 people at Kanmo you'd most want to interview in week one, and write 3 questions you'd ask each of them. Your questions should be different for each person based on their role and what they'd know.</p></div>`},
{d:4,title:"Retail & supply chain 101",phase:1,pillar:"dp",tags:["dp"],time:"50 min",content:`<h2>Retail & supply chain 101 — your new world in context</h2><div class="mod-meta">Phase 1 · Day 4 · Demand Planning Foundations · 50 min</div><p>Before you can forecast demand, you need a clear mental model of the journey a product takes from manufacturer to customer. This physical journey — the supply chain — is the context within which every demand planning decision is made. Understanding it intuitively will make the rest of demand planning click much faster.</p><h3>The end-to-end product journey</h3><p><strong>1. Design & sourcing (Month 1–2).</strong> The brand's product team designs the range and selects suppliers — often in China, Vietnam, or Bangladesh for fashion products. The demand planner's input here is the initial volume estimate: how many units of each style to put into production. This decision happens 4–6 months before the product reaches the store, and it's largely irreversible once placed.</p><p><strong>2. Purchase order issuance (Month 2–3).</strong> Based on the demand forecast, purchasing issues a PO to the supplier. The number on this PO is locked in. Any change after this point incurs significant cost — either a cancellation fee or a costly short-notice production run.</p><p><strong>3. Production (Month 3–5).</strong> The factory manufactures the goods. For fashion, lead times from PO to finished goods are typically 60–120 days depending on product complexity and supplier location.</p><p><strong>4. Shipping & customs (Month 5–6).</strong> Sea freight from Asia to Indonesia takes 2–4 weeks. Indonesian customs clearance adds 1–3 weeks. Air freight is 3–5x faster but 6–10x more expensive — reserved for emergency replenishment only.</p><p><strong>5. Distribution center (Month 6).</strong> Goods arrive at Kanmo's warehouse or a 3PL. The demand planner works with the merchandising team to allocate stock to individual stores based on sales history, store capacity, and expected demand.</p><p><strong>6. Store & sell-through.</strong> Products are available to customers. The demand planner tracks weekly sell-through rates — how fast inventory is moving — and flags slow-movers or high-demand SKUs that need inter-store reallocation or emergency replenishment.</p><div class="callout c-def"><h4>Essential vocabulary</h4><p><strong>SKU (Stock Keeping Unit):</strong> A unique identifier for one product in one variant. A shoe might have 30 SKUs: 5 styles × 6 sizes. Each is planned and tracked independently.</p><p><strong>Lead time:</strong> The total elapsed time from placing an order to having goods available for sale. Typically 4–6 months for imported fashion in Indonesia.</p><p><strong>Sell-through rate:</strong> What percentage of received inventory has sold. 70% sell-through after 8 weeks is generally healthy in fashion retail.</p><p><strong>OTB (Open-to-Buy):</strong> The purchase budget available for the season. Demand forecasts directly determine OTB allocation across brands and categories.</p><p><strong>3PL (Third-party logistics):</strong> An outsourced warehouse and distribution provider.</p></div><h3>Why lead times are the hardest part</h3><p>The single most important thing to understand: <strong>the decisions you make today affect what happens in 4–6 months</strong>. Unlike most analytical roles where the impact of a decision is visible quickly, demand planning decisions have a long, invisible lag.</p><p>If you over-forecast a category by 30% this season, excess inventory will be sitting in the warehouse in 5 months. You'll be in meetings explaining why gross margin is below plan because of markdowns needed to clear it. If you under-forecast, stores run out during peak season — and lost sales can never be recovered.</p><p>This time lag is what makes demand planning genuinely difficult. You're making consequential decisions with imperfect information, long before the results are visible. The only antidote is systematic process and structured judgment.</p><h3>Multi-brand complexity at Kanmo</h3><p>A multi-brand group creates layers of complexity beyond a single-brand retailer:</p><ul><li><strong>Each brand has a different seasonal calendar.</strong> Children's apparel (Justice, Kidzoona) peaks in July for back-to-school. Food & beverage (Tous les Jours) peaks around Lebaran. Planning these simultaneously requires switching mental models constantly.</li><li><strong>Different lead times by brand.</strong> A locally-sourced F&B brand might have 2–4 week lead times. An imported children's fashion brand might have 20 weeks. Your planning horizons are completely different for each.</li><li><strong>Separate brand P&Ls, shared infrastructure.</strong> The commercial manager for Brand A doesn't care if Brand B is performing well. But the warehouse, ERP system, and buying power are shared — creating dependencies and competing priorities.</li></ul><div class="callout c-case"><h4>Case study: What happens when lead times aren't respected</h4><p>A fashion retailer in Jakarta had a demand planner who consistently submitted purchase order quantities two weeks late because she was waiting for the sales team to confirm their promotional calendar. Over time, the supplier reduced her company's production slot — meaning the company couldn't get as many units as it needed even when willing to pay full price.</p><p>During December peak season, a popular product line sold out in week 2 of a planned 6-week promotional window. The late PO had reduced the maximum production run. Lost sales were estimated at Rp 2.8 billion for that season alone — a figure that was directly traceable to the two-week planning delay.</p><p>Demand planning is not just analytical — it is time-sensitive in ways that have direct financial consequences.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Pick one Kanmo brand (use publicly available information or your best hypothesis). Map its supply chain end-to-end: likely suppliers and their locations, estimated lead time at each stage (design, production, shipping, customs, distribution, store allocation), total supply chain lead time, and the two biggest risks at each stage. Draw it as a numbered flow or a simple diagram. This will be one of the first things you verify when you start — compare your map against reality.</p></div>`},
{d:5,title:"What demand planning actually is",phase:1,pillar:"dp",tags:["dp"],time:"45 min",content:`<h2>What demand planning actually is — the job behind the title</h2><div class="mod-meta">Phase 1 · Day 5 · Demand Planning Foundations · 45 min</div><p>Demand planning is the process of estimating how much of each product customers will want to buy — at what time, in what location, in what quantity — so the business can have the right stock in the right place without holding more than necessary. That sounds simple. The reality involves forecasting the future behavior of thousands of customers across hundreds of SKUs using imperfect data, incomplete market information, and input from colleagues with competing objectives. And you're doing it months in advance, for products that take months to manufacture and ship.</p><h3>The demand planner's core output</h3><p>Your primary deliverable is a <strong>demand forecast</strong>: a number (or range) representing expected sales for each SKU, in each location, for each future time period. This forecast drives:</p><ul><li><strong>Purchasing:</strong> How many units to order from suppliers, and when</li><li><strong>Inventory management:</strong> How much safety stock to hold, when to reorder</li><li><strong>Financial planning:</strong> Revenue and COGS projections for the budget and quarterly forecasts</li><li><strong>Operations:</strong> Warehouse staffing, receiving capacity, store replenishment schedules</li><li><strong>Sales & Marketing:</strong> Understanding whether targets are achievable, validating promotional investment</li></ul><p>The demand forecast is the spine of the retail business. Every function that depends on knowing what will sell — which is most of them — depends on you getting it right.</p><h3>The three components of demand</h3><p><strong>Baseline demand:</strong> The underlying "normal" level of sales in a typical week, absent any special influences. This is what you'd sell with no promotions, no stockouts, and no unusual market events.</p><p><strong>Seasonal demand:</strong> Predictable fluctuations tied to the calendar — school year rhythms, holidays, cultural events. Lebaran typically drives 150–250% of normal monthly sales for most consumer categories in Indonesia. Back-to-school drives 130–160% for children's products. These patterns repeat year after year and can be quantified precisely from historical data.</p><p><strong>Promotional uplift:</strong> Incremental demand generated by specific activities — a price promotion, a store event, a marketing campaign, a new product launch. This is the hardest component to forecast because it varies with the execution quality of the promotion, competitive activity, and countless other factors.</p><p>A good forecast separates these three components and models each independently. A naïve forecast adds them all into one number and hopes for the best.</p><h3>What makes demand planning genuinely hard</h3><ul><li><strong>New products have no history.</strong> You can't use historical data to forecast a product that's never been sold. You use analogue products, market research, and judgment — and you're often wrong in the first season.</li><li><strong>Demand signals are noisy.</strong> A single week of unusually high sales might be a genuine trend or a random fluctuation. Distinguishing signal from noise requires experience and systematic tracking.</li><li><strong>The business changes.</strong> Store openings, brand relaunches, competitor actions, economic shocks — any of these can make historical patterns irrelevant overnight. The 2020–2021 period made most retail demand models useless as reference points.</li><li><strong>Stakeholders have biases.</strong> Sales teams tend to push for optimistic forecasts to ensure inventory availability. Marketing tends to over-estimate promotional uplift to justify campaign spend. Finance tends toward conservatism to protect working capital. Your job is to synthesize these biases into an honest number.</li></ul><div class="callout c-def"><h4>The asymmetric cost of errors</h4><p><strong>Over-forecast:</strong> Excess inventory → markdown → lower gross margin → potential write-off. Cash tied up in stock that doesn't sell.<br/><strong>Under-forecast:</strong> Stockout → lost sales (permanent, unrecoverable) → customer frustration → potential brand damage → emergency air freight replenishment at 6–10x normal cost.<br/>Neither error is obviously worse — it depends on the product, the season, and the margin structure. Part of your job is understanding which error is more costly in each specific context.</p></div><h3>What a typical week looks like</h3><p><strong>Monday:</strong> Review last week's actual sales vs. forecast for all brands. Identify the biggest variances. Flag SKUs at stockout risk in the next 4 weeks based on current sell-through rates.</p><p><strong>Tuesday–Wednesday:</strong> Update rolling forecasts based on latest actuals. Incorporate new intelligence from Sales and Marketing — upcoming promotions, store events, competitor moves.</p><p><strong>Thursday:</strong> Prepare the demand review pack. Compile actuals vs. plan, key variance drivers, forward risks, and recommendations into a concise one-page summary.</p><p><strong>Friday:</strong> Demand review meeting with cross-functional stakeholders. Weekly update to your manager. Review open purchase orders that may need revision.</p><p>Monthly: full S&OP cycle. Quarterly: budget update and seasonal buy plan for the next major season.</p><div class="callout c-case"><h4>Case study: A real decision moment</h4><p>It's Tuesday morning. You're reviewing last week's sales for the Justice brand. One SKU — a backpack featured in the weekly promotion — sold 340 units against a forecast of 200. Current inventory: 180 units. Supplier lead time: 10 weeks.</p><p>You now have several decisions. Is this a genuine trend change or a one-time promotional spike? Should you place an emergency replenishment order knowing it won't arrive for 10 weeks? Should you reallocate existing stock from slower stores to the ones running low? Do you need to change the promotional plan for next week?</p><p>Each decision requires different data — sell-through by store, promotion calendar, supplier capacity, cash position. This is demand planning in practice: not just building forecasts, but making consequential inventory decisions under uncertainty in real time.</p></div><div class="callout c-task"><h4>Today's task</h4><p>A Kanmo brand sold: Jan 800, Feb 750, Mar 900, Apr 950, May 1,100, Jun 1,050 units. July historically has a seasonal uplift of 40% (back-to-school). A 20% promotional uplift is planned for the last 2 weeks of July only.</p><p>Build a July forecast that separates: (1) baseline demand using a 3-month moving average, (2) seasonal uplift applied to the full month, (3) promotional uplift applied only to the promotional weeks. Show every step of your calculation. Then: current inventory is 1,200 units and supplier lead time is 8 weeks. What action, if any, do you take today?</p></div>`},
{d:6,title:"Stakeholder mapping",phase:1,pillar:"90d",tags:["90d"],time:"40 min",content:`<h2>Stakeholder mapping — know who you need before you need them</h2><div class="mod-meta">Phase 1 · Day 6 · First 90 Days Framework · 40 min</div><p>Demand planning is one of the most cross-functional roles in retail. Your forecast touches Sales, Marketing, Finance, Operations, and the commercial managers for each brand. None of them report to you. All of them can make your job dramatically easier or harder. A stakeholder map built before you arrive — and deliberately executed in your first weeks — is one of the highest-leverage investments of your transition.</p><h3>Your stakeholder landscape at Kanmo</h3><p><strong>Your direct manager:</strong> Defines your success criteria and either protects you from organizational politics or exposes you to it. Invest here first and most consistently. Everything else depends on this relationship being solid.</p><p><strong>Brand / commercial managers:</strong> Own the P&L for each brand. Simultaneously your most important input sources (they know the promotions, launches, and market conditions that drive demand) and your most frequent challengers (they'll push back on forecasts they don't like). You need them as partners, not adversaries.</p><p><strong>Finance business partner:</strong> Translates your demand forecast into the financial budget. Cares about gross margin and working capital efficiency. Win this relationship and you have an ally in every budget discussion. Lose it and your forecasts will be second-guessed in rooms you're not in.</p><p><strong>Supply chain / purchasing team:</strong> Acts on your forecast to place purchase orders. If your forecasts are unreliable, their jobs become unpredictable and stressful. Build trust here and they'll tell you about supply constraints before they become crises.</p><p><strong>Warehouse / operations team:</strong> Receives and stores the inventory your forecasts generate. Chronic over-forecasting fills their warehouse with slow-moving stock and creates lasting tension.</p><p><strong>IT / systems team:</strong> Manages the ERP and any planning tools. You will need their help to get data access, understand system configurations, and eventually implement any tool improvements. This relationship is often neglected by planners and then desperately needed later.</p><h3>Three categories of stakeholder orientation</h3><p>Watkins divides stakeholders into three groups based on their orientation toward you:</p><p><strong>Supporters</strong> are aligned with your agenda and want you to succeed. Invest in these relationships but don't take them for granted — support erodes when it isn't nurtured.</p><p><strong>Opponents</strong> are not aligned for reasons that may be entirely legitimate — competing interests, past negative experiences with the function, or genuine disagreement about priorities. Understand <em>why</em> they're opposed before deciding how to respond. Treating every opponent as hostile is a mistake.</p><p><strong>Persuadables</strong> could go either way. This is where your relationship-building energy should be most concentrated in weeks 1–4. The difference between a successful and a failed transition is often determined entirely by which way the persuadables move.</p><div class="callout c-def"><h4>Why Sales teams distrust demand planners by default</h4><p>Sales teams often start skeptical of demand planners — not because they're difficult, but because of how the forecast affects them. If the planner raises the forecast, Sales feels pressure to hit a higher target. If the planner lowers it, the commercial manager worries about having insufficient stock to support their sales goals. Either way, the forecast feels like a constraint. Recognizing this dynamic in advance lets you address it proactively — "I see the forecast as a tool for your success, not a cap on it" — rather than being confused when pushback appears.</p></div><div class="callout c-case"><h4>Case study: The stakeholder who could have been an ally</h4><p>A new demand planner was introduced warmly to all five brand managers at her new company. Four were supportive. The fifth was visibly cold in the first meeting. She assumed he was just difficult and deprioritized the relationship.</p><p>Over the next three months, this brand manager consistently provided late inputs to forecasting, challenged every forecast in S&OP, and went directly to the CEO to complain about the demand plan twice.</p><p>It turned out the brand manager had previously been responsible for his own brand's forecasting. The new demand planning function had taken away a responsibility he valued — and nobody had acknowledged this or involved him in designing the new process. He wasn't hostile to demand planning in principle; he felt sidelined without being consulted. One early conversation — "I'd love to understand how you've been managing forecasting and what's worked well" — would have turned him from an opponent into a co-architect of the new process.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Build your Kanmo stakeholder map as a table with these columns: Name / Role, What they control or influence, Why they might support you, Why they might oppose or be skeptical, and Your relationship-building approach in week one. Include at least 6 stakeholders: your manager, 2 brand commercial managers, Finance, Supply Chain, and one wildcard whose role is uncertain but seems influential.</p><p>For every stakeholder you've categorized as Opponent or Persuadable: write one specific question you'd ask them to understand their perspective before forming a conclusion.</p></div>`},
{d:7,title:"Negotiate your success",phase:1,pillar:"90d",tags:["90d"],time:"40 min",content:`<h2>Negotiate your success — the 5 conversations you must have</h2><div class="mod-meta">Phase 1 · Day 7 · First 90 Days Framework · 40 min</div><p>The expectations that will define whether you succeed or fail in your new role are almost never written down. They live in your manager's head, shaped by their past experiences, current pressures, and unspoken assumptions about what "good" looks like. If you don't surface and align on those expectations deliberately, you risk spending months optimizing for the wrong things — and you won't find out until a performance review or a tense conversation makes it unavoidably clear.</p><p>Watkins' 5 Conversations framework gives you a structure for getting that alignment early, before the gap between what's expected and what you're delivering has time to compound into a real problem.</p><h3>Conversation 1: The situation</h3><p>Get alignment on what is actually true right now. Not the polished version from the interview — the honest current state. What does your manager actually think is most broken about the function? What are they most worried about? What keeps them up at night about demand planning?</p><p>Good opening questions: "What would you most want to see different about demand planning in 12 months?" / "What's the biggest risk to the function in the next 6 months?" / "If you could fix one thing immediately, what would it be?"</p><h3>Conversation 2: Expectations</h3><p>The most critical conversation and the most often skipped. You need to know, with specificity, what your manager expects at 30 days, 60 days, and 90 days. Not "get up to speed" — that's not a deliverable. "Be running the demand review meeting independently by week 8" is a deliverable.</p><p>Ask: "What does a successful first 90 days look like from your perspective?" / "What would tell you, at the end of month 3, that this transition has gone well?" / "Are there specific deliverables you're expecting by certain milestones?" Then confirm what you heard: "So if I understand correctly, you want me to take ownership of the S&OP by month 2. Is that right?" This simple act of confirmation prevents enormous misunderstanding.</p><h3>Conversation 3: Working style</h3><p>People have radically different preferences for communication frequency, level of detail, and how much autonomy they give. Getting this wrong creates friction that has nothing to do with the quality of your work.</p><p>Ask: "How do you prefer to be kept informed — brief daily check-ins, weekly summaries, or only when there's something important?" / "How much do you like to be involved in day-to-day decisions versus having me bring you only the big ones?" / "What's your preferred channel for urgent issues versus routine updates?"</p><h3>Conversation 4: Resources</h3><p>What do you need to do your job well? Data access, specific tool licenses, introductions to key stakeholders, protected time with the IT team to understand the ERP. Identifying these needs early is much easier than discovering 60 days in that you've been trying to do a data-intensive job without access to the data.</p><p>Ask: "What data sources and tools will I have access to from day one?" / "Are there known constraints or limitations I should expect?" / "Who should I prioritize meeting in my first two weeks, and could you make the introduction?"</p><h3>Conversation 5: Personal development</h3><p>This signals long-term investment in the role and surfaces what your manager values in terms of growth — which tells you what they'll reward over time.</p><p>Ask: "What are the most important skills for me to develop in this role?" / "Are there any gaps in my background I should be particularly focused on?" / "What does a strong BA Associate Manager typically go on to do from here?"</p><div class="callout c-case"><h4>Case study: The expectations gap that derailed a strong start</h4><p>A demand planning manager joined a multi-brand group with strong analytical skills and real enthusiasm. In her first month, she spent most of her time building a data model she believed would form the foundation of a much-improved forecasting process.</p><p>Her manager had never explicitly discussed 30-day expectations with her. He had been expecting her to lead the monthly S&OP by day 45. When she missed that implicit deadline because she was still building the model, the relationship went cold. He felt she was prioritizing her personal agenda over the team's immediate needs. She felt blindsided — she didn't even know leading the S&OP was a priority.</p><p>One honest conversation about expectations in week one would have prevented this. She would have learned about the S&OP expectation, adjusted her priorities, and potentially framed the model as a medium-term improvement rather than her immediate focus. Same outcome; completely different experience.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Write out all 5 conversations as if you're going to have them in your first week at Kanmo. For each: (1) the 2 most important questions you would ask, (2) what you already know or can reasonably hypothesis about the answer based on your research, and (3) what you would do differently based on each possible answer. This is preparation, not a script. The goal is to walk into these conversations with enough clarity that they feel natural.</p></div>`},
{d:8,title:"Sales forecasting fundamentals",phase:2,pillar:"dp",tags:["dp"],time:"60 min",content:`<h2>Sales forecasting fundamentals — the quantitative core</h2><div class="mod-meta">Phase 2 · Day 8 · Demand Planning · 60 min</div><p>Sales forecasting is where demand planning becomes quantitative. You're producing a number that will drive purchasing decisions worth hundreds of millions of rupiah. You need to understand the core statistical methods — not just mechanically, but intuitively enough to know when each is appropriate, when the model is wrong, and when human judgment needs to override the math.</p><h3>Method 1: Simple Moving Average (SMA)</h3><p>The simplest forecasting method. Average the last N periods and use that as your forecast for the next period. Intuitive, easy to explain, easy to audit.</p><div class="callout c-formula"><h4>Formula & worked example</h4><p>SMA(N) = (Period₋₁ + Period₋₂ + ... + Period₋ₙ) / N</p><p>Sales: Jan 100, Feb 120, Mar 110, Apr 130, May 125.<br/>SMA(3) for June = (110 + 130 + 125) / 3 = <strong>121.7</strong></p></div><p><strong>When to use it:</strong> Stable demand with no clear trend or seasonality. Basic replenishment products with consistent weekly sales.</p><p><strong>Weakness:</strong> Responds slowly to genuine demand changes because all periods have equal weight. If sales jump from 100 to 150, the SMA will lag for N periods while it catches up. Also cannot extrapolate a trend — it will always forecast the average, so in a growing market it consistently under-forecasts.</p><p><strong>Choosing N:</strong> Small N (2–3) reacts quickly but is sensitive to noise. Large N (6–12) smooths noise but is slow to respond to real shifts. For most retail products, 3–6 periods is appropriate for the SMA baseline.</p><h3>Method 2: Weighted Moving Average (WMA)</h3><p>A refinement where recent periods receive higher weights. Allows faster response to genuine demand changes while still using multiple periods to dampen noise.</p><div class="callout c-formula"><h4>Formula & worked example</h4><p>WMA = (W₁×Period₋₁ + W₂×Period₋₂ + W₃×Period₋₃) / (W₁+W₂+W₃)</p><p>Last 3 months: 100, 120, 130. Weights: 3 (most recent), 2, 1.<br/>WMA = (3×130 + 2×120 + 1×100) / 6 = (390+240+100)/6 = <strong>121.7</strong><br/>vs SMA(3) = (100+120+130)/3 = <strong>116.7</strong><br/>WMA is higher because it weights the most recent (highest) period more.</p></div><h3>Method 3: Exponential Smoothing (ETS)</h3><p>The workhorse of practical demand forecasting. It assigns exponentially decreasing weights to all historical observations — the most recent period has the highest weight, and older periods' influence decays geometrically. A single parameter, <strong>alpha (α)</strong>, controls how responsive the forecast is to new information.</p><div class="callout c-formula"><h4>Formula & full worked example</h4><p>F(t+1) = α × Actual(t) + (1-α) × F(t)</p><p>Where α is between 0 and 1. High α = reactive. Low α = stable.</p><p>Sales history: 80, 75, 90, 85, 95, 100. α = 0.3. Start with F = 80.<br/>After 75: F = 0.3(75) + 0.7(80) = 22.5 + 56 = 78.5<br/>After 90: F = 0.3(90) + 0.7(78.5) = 27 + 54.95 = 81.95<br/>After 85: F = 0.3(85) + 0.7(81.95) = 25.5 + 57.37 = 82.87<br/>After 95: F = 0.3(95) + 0.7(82.87) = 28.5 + 58.01 = 86.51<br/>After 100: F = 0.3(100) + 0.7(86.51) = 30 + 60.56 = <strong>90.56 → July forecast: ~91</strong></p><p>Even though June was 100, the forecast is only 91. With α=0.3, you're saying: this might be a real increase, but let's not over-react to one month of data. If July also comes in above forecast, the model will revise upward next cycle.</p></div><p><strong>Choosing alpha:</strong> α 0.1–0.2 for very stable products (basic staples, predictable replenishment). α 0.3–0.4 for moderate variability (most fashion apparel). α 0.5–0.7 for volatile demand (trend-driven fashion, new products, promotion-heavy categories). In practice, good demand planning software optimizes alpha automatically — but you need to understand what it's doing and when to override it.</p><h3>The limits of statistical forecasting</h3><p>All three methods share a critical limitation: they only know about the past. They cannot account for a promotion you're planning next month, a new store opening in August, a competitor closing their nearby store, or a supply disruption. Statistical forecasting is the <em>starting point</em> — you take the baseline and layer on market intelligence, commercial input, and judgment. The result of that process — the <strong>consensus forecast</strong> — is what drives purchasing decisions.</p><div class="callout c-case"><h4>Case study: When alpha mattered</h4><p>A demand planner at a Bandung retailer used α=0.1 across her entire product portfolio — a "safe," low-reactive setting she'd been taught as a default. During Lebaran season, when demand surged sharply over a 3-week period, her forecasts for the following weeks were still anchored heavily on pre-season levels. She consistently under-forecasted by 25–30% during the peak itself, causing stockouts in week 3 of a 4-week peak window.</p><p>The fix: she segmented her SKUs by demand volatility. Stable basics stayed at α=0.1. Seasonal and promotion-sensitive products moved to α=0.4. The following Lebaran, her peak-period accuracy improved by 18 percentage points.</p></div><div class="callout c-task"><h4>Today's task</h4><p>A product has this 8-month sales history: 200, 210, 195, 220, 215, 230, 225, 240.</p><p>(1) Calculate SMA(3) for month 9. (2) Calculate ETS for month 9 using α=0.4, starting from month 3 as your initial forecast. Show every step. (3) Which gives a higher forecast? Explain intuitively why. (4) What 3 additional factors would you want to know before finalizing your month 9 forecast — and how might each change your number?</p></div>`},
{d:9,title:"Seasonality & trend analysis",phase:2,pillar:"dp",tags:["dp"],time:"55 min",content:`<h2>Seasonality & trend analysis — reading the patterns in your data</h2><div class="mod-meta">Phase 2 · Day 9 · Demand Planning · 55 min</div><p>The methods from Day 8 work for stable demand. But most retail demand follows repeating seasonal patterns — and a planner who doesn't account for them will systematically over-forecast in slow periods and under-forecast in peaks. In Indonesian retail, this isn't a calibration issue. It can mean the difference between a healthy inventory position and a Lebaran stockout or a post-peak write-off crisis.</p><h3>Time series decomposition</h3><p>Any demand time series has four components: <strong>Level</strong> (the average underlying demand), <strong>Trend</strong> (long-term direction — growing, flat, or declining), <strong>Seasonality</strong> (regular, calendar-driven fluctuations), and <strong>Noise</strong> (random variation that follows no pattern). Good forecasting models L, T, and S accurately — and avoids mistaking N for a real signal.</p><h3>Calculating seasonal indices</h3><p>A seasonal index tells you how much above or below average demand is in a given period. Index 1.4 = 40% above average. Index 0.7 = 30% below average.</p><div class="callout c-formula"><h4>How to calculate a seasonal index</h4><p>1. Calculate the overall average monthly sales across the full year.<br/>2. Divide each month's average by the overall average.</p><p>Example: Annual average = 1,000 units/month. July average = 1,400 units.<br/>July index = 1,400 / 1,000 = <strong>1.40</strong></p><p>To apply to a forecast:<br/>Baseline forecast for July = 1,050 (from your ETS model).<br/>Seasonal-adjusted forecast = 1,050 × 1.40 = <strong>1,470 units</strong></p></div><h3>Indonesian retail seasonality patterns you must know</h3><p><strong>Lebaran (Eid al-Fitr):</strong> The single biggest retail event in Indonesia. The date shifts by ~11 days each year on the Gregorian calendar (Islamic lunar calendar). Most consumer retail categories see 150–250% of normal monthly sales in the 2–4 weeks before Eid. Planning requires inventory built 3–4 months in advance. Critical mistake to avoid: indexing by calendar month rather than by event proximity. If Lebaran is in April one year and May the next, applying last year's April index to this year's April will be wrong by 2–3 weeks of peak timing.</p><p><strong>Back-to-school (July–August):</strong> Critical for Kanmo brands in children's categories. Typically 130–160% of average monthly sales. Driven by school year start in mid-July.</p><p><strong>Year-end (December):</strong> Gift-giving behavior drives 130–180% uplift in most lifestyle and fashion categories. Christmas and New Year create the second-biggest peak of the year for most brands.</p><p><strong>Low season (February, September):</strong> The months immediately after major peak periods are the slowest — often 60–80% of annual average. February follows year-end. September follows back-to-school. These are the highest-risk periods for excess inventory from over-forecasting peaks.</p><h3>Additive vs multiplicative seasonality</h3><p><strong>Additive:</strong> The seasonal effect is a fixed number added to the baseline. "Peak season adds 500 units." Use when the seasonal variation stays roughly constant regardless of the baseline level.</p><p><strong>Multiplicative:</strong> The seasonal effect is a percentage of the baseline. "Peak season is 40% above baseline." Use when variation grows proportionally with the baseline — as the brand grows, its peaks also grow. <em>Multiplicative is more appropriate for most retail contexts.</em></p><h3>Trend analysis</h3><p>Trend is the long-term direction of demand. A 12-month moving average, plotted over time, is one of the simplest ways to visualize trend — it removes seasonal noise and shows the underlying trajectory.</p><p>Trend matters for interpretation: if a product's sales are growing at 15% per year, a month that's 12% above last year is actually a <em>deceleration</em> — growth is slowing, even though sales are still increasing. Without understanding trend, you'd misread this as acceleration and over-forecast forward.</p><p><strong>Holt's method (trend-adjusted ETS):</strong> When demand has a clear trend, standard exponential smoothing will consistently under-forecast (growing market) or over-forecast (declining). Holt's method adds a second smoothing parameter — beta (β) — for the trend component. Each period, you update both your level estimate and your trend estimate. Excel's FORECAST.ETS function implements this automatically.</p><div class="callout c-case"><h4>Case study: Getting Lebaran wrong because of calendar shift</h4><p>A demand planner applied last year's seasonal indices by calendar month to her Lebaran forecast. Lebaran that year fell in April — two weeks earlier than the previous year, which had been in late April/early May. She applied last year's April index to this year's April, not realizing the peak window had shifted earlier by two weeks.</p><p>Result: her April forecast was too low (peak had shifted into early April) and her May forecast was too high (the season was already winding down). The company received its largest inventory shipment two weeks after peak demand had passed. They entered the slow season with excess stock that took 4 months to clear through markdowns that destroyed that quarter's gross margin.</p><p>Fix: for holidays that move on the Islamic calendar, always index seasonality to the event date — "Week –3 before Lebaran" — not to the calendar month.</p></div><div class="callout c-task"><h4>Today's task</h4><p>You have 2 years of monthly sales data for a children's brand. Year 1: 900, 850, 950, 1000, 1800, 800, 1400, 1350, 950, 850, 900, 1600. Year 2: 950, 900, 1000, 1050, 2100, 850, 1550, 1500, 1000, 900, 950, 1750.</p><p>(1) Calculate the seasonal index for each month using Year 1. (2) Calculate the overall growth rate from Year 1 to Year 2. (3) Using Year 2 as baseline and your seasonal indices, forecast each month of Year 3. (4) Which 3 months carry the highest stockout risk, and which carry the highest overstock risk? What would you do differently for those months in your planning?</p></div>`},
{d:10,title:"Forecast accuracy metrics",phase:2,pillar:"dp",tags:["dp"],time:"50 min",content:`<h2>Forecast accuracy metrics — measuring what actually matters</h2><div class="mod-meta">Phase 2 · Day 10 · Demand Planning · 50 min</div><p>A forecast without accuracy measurement is just a guess you haven't checked. Accuracy metrics are the feedback loop that tells you whether your process is working, where it's failing, and whether you're improving over time. In a new role, being able to calculate and speak intelligently about accuracy metrics — and what drives them — is one of the fastest ways to establish credibility with Finance and senior leadership.</p><h3>MAPE — Mean Absolute Percentage Error</h3><p>The most widely used metric in retail forecasting. Measures average percentage error, regardless of whether you over- or under-forecasted.</p><div class="callout c-formula"><h4>Formula & example</h4><p>MAPE = (1/n) × Σ |Actual - Forecast| / Actual × 100%</p><p>Month 1: F=100, A=90. Error = |90-100|/90 = 11.1%<br/>Month 2: F=150, A=160. Error = |160-150|/160 = 6.3%<br/>Month 3: F=80, A=100. Error = |100-80|/100 = 20.0%<br/>MAPE = (11.1 + 6.3 + 20.0) / 3 = <strong>12.5%</strong></p></div><p><strong>What's "good"?</strong> In fashion retail: 20–30% at SKU level is reasonable (individual products are inherently volatile). 10–15% at category level is achievable. 5–10% at brand level is expected. Always ask: "MAPE at what level of aggregation?" — a 5% brand MAPE can coexist with a 45% SKU MAPE.</p><p><strong>MAPE's main weakness:</strong> It treats a 10-unit error on a 20-unit product (50% error) identically to a 10-unit error on a 200-unit product (5% error). For portfolios mixing high and low volume SKUs, low-volume items dominate the MAPE even though they have minimal financial impact.</p><h3>WMAPE — Weighted Mean Absolute Percentage Error</h3><p>Solves the MAPE problem by weighting each SKU's error by its share of total volume. High-volume SKUs — the ones that actually matter financially — drive the metric.</p><div class="callout c-formula"><h4>Formula & comparison example</h4><p>WMAPE = Σ |Actual - Forecast| / Σ Actual × 100%</p><p>SKU A (high volume): F=1000, A=900. Absolute error = 100.<br/>SKU B (low volume): F=50, A=30. Absolute error = 20.<br/>WMAPE = (100+20) / (900+30) × 100% = 120/930 = <strong>12.9%</strong></p><p>Unweighted MAPE: (|900-1000|/900 + |30-50|/30)/2 = (11.1% + 66.7%)/2 = <strong>38.9%</strong></p><p>The unweighted MAPE massively overstates the problem because the tiny SKU's high error dominates. WMAPE correctly shows that the portfolio accuracy is much better because the big error is on the small SKU. Use WMAPE for reporting to leadership; use SKU-level MAPE for diagnosing where to improve.</p></div><h3>Forecast Bias</h3><p>Bias measures whether you're systematically too high or too low. A forecast with low MAPE but high bias is dangerous — you're consistently wrong in the same direction, which creates chronic overstock or chronic understock.</p><div class="callout c-formula"><h4>Formula</h4><p>Bias = Σ (Forecast - Actual) / Σ Actual × 100%</p><p>Positive bias = consistently over-forecasting → excess inventory.<br/>Negative bias = consistently under-forecasting → stockouts.</p><p>A well-calibrated process should have bias near zero over time.</p></div><p><strong>Common causes of positive bias:</strong> Sales teams inflate forecasts to ensure stock availability. Promotional forecasts over-estimate uplift. New product optimism. Seasonal indices that haven't been updated in years.</p><p><strong>Common causes of negative bias:</strong> Conservative adjustment by planners afraid of over-committing. Failure to fully capture a growing trend. Under-estimating peak events like Lebaran.</p><h3>Other metrics worth knowing</h3><p><strong>Fill rate:</strong> % of customer demand fulfilled from available stock without stockouts or back-orders. Target typically 95%+. Connects your forecast accuracy directly to customer experience.</p><p><strong>Forecast Value Added (FVA):</strong> How much better is your adjusted consensus forecast compared to a naïve forecast (e.g., "same as last year")? If your complex process doesn't outperform a simple naïve baseline, your added complexity isn't creating value. Many demand planning processes fail this test.</p><div class="callout c-case"><h4>Case study: Finding the real accuracy problem</h4><p>A demand planner reported a brand-level MAPE of 12% — considered acceptable. But the CFO kept complaining that they seemed to always either have too much inventory or constantly be stocking out on popular items. The planner investigated at SKU level: MAPE was 45%.</p><p>The reason the brand-level looked fine: over-forecasting on unpopular sizes was exactly offset by under-forecasting on popular sizes. They had excess inventory in the sizes nobody wanted and stockouts in the sizes everyone wanted. The brand total looked accurate while the product mix was completely wrong.</p><p>The fix required tracking accuracy by size cluster, not just overall — and recognizing that brand-level MAPE had been masking a distribution problem that was costing the business both in markdowns (excess small/large sizes) and lost sales (stockouts in medium sizes).</p></div><div class="callout c-task"><h4>Today's task</h4><p>SKU A (high volume) — 6 months: Forecasts [1000,1100,950,1200,1050,1100], Actuals [900,1050,1000,1150,1100,1050]<br/>SKU B (medium volume) — Forecasts [300,280,320,290,310,300], Actuals [320,300,290,310,280,320]<br/>SKU C (low volume) — Forecasts [50,60,45,55,50,60], Actuals [35,70,40,65,45,50]</p><p>(1) Calculate MAPE for each SKU. (2) Calculate WMAPE for the total portfolio. (3) Calculate bias for each SKU — which have systematic bias and in which direction? (4) What is your most important finding from this analysis? (5) If you had 2 hours to improve accuracy this month, which SKU would you focus on and why?</p></div>`},
{d:11,title:"Inventory planning",phase:2,pillar:"dp",tags:["dp"],time:"55 min",content:`<h2>Inventory planning — turning forecasts into purchasing decisions</h2><div class="mod-meta">Phase 2 · Day 11 · Demand Planning · 55 min</div><p>The forecast is the input. Inventory planning is where analysis becomes action: deciding how much to order, when to order, and how much buffer to hold. Get this right and the business runs smoothly. Get it wrong and you're explaining stockouts or writing off excess inventory at the next quarterly review.</p><h3>The fundamental inventory trade-off</h3><p><strong>Holding costs:</strong> Warehousing fees, insurance, capital tied up in stock, risk of obsolescence or markdown if the product doesn't sell. For a fashion item, holding cost typically runs 20–30% of product cost per year when you account for all factors including capital cost.</p><p><strong>Stockout costs:</strong> Lost sales (permanent — you can never recover a missed sale), customer dissatisfaction, emergency replenishment via air freight (6–10x sea freight cost), potential long-term damage to brand perception. In peak season, a stockout during a 6-week selling window is catastrophic because you can't recover the weeks you missed.</p><p>The goal: find the inventory level that minimizes the sum of both costs. In practice, this means holding enough stock to meet demand with high confidence — without holding so much that holding costs eat your margin.</p><h3>Safety stock — your buffer against uncertainty</h3><p>Safety stock is inventory you hold above and beyond what the forecast says you'll need. It protects against two types of uncertainty: forecast error (you sold more than expected) and lead time variability (the supplier delivered late).</p><div class="callout c-formula"><h4>Statistical safety stock formula</h4><p>Safety Stock = Z × σ_demand × √(Lead Time)</p><p>Where Z = service level factor (1.28 for 90%, 1.65 for 95%, 1.96 for 97.5%) and σ_demand = standard deviation of weekly demand.</p><p>Example: σ = 20 units/week, Lead Time = 6 weeks, service level = 95% (Z=1.65).<br/>Safety Stock = 1.65 × 20 × √6 = 1.65 × 20 × 2.45 = <strong>81 units</strong></p><p><strong>Simplified version:</strong> Safety Stock = (Max weekly demand − Average weekly demand) × Lead time weeks<br/>Example: Max weekly = 140, Avg weekly = 100, LT = 6 weeks → SS = (140−100) × 6 = <strong>240 units</strong></p></div><p>The statistical version is more precise for high-volume products. The simplified version is more practical for day-to-day planning and easier to explain to stakeholders. Know both.</p><h3>Reorder Point (ROP)</h3><p>The inventory level at which you place a new purchase order. If inventory drops below this before the new order arrives, you risk a stockout.</p><div class="callout c-formula"><h4>Formula & example</h4><p>ROP = (Average daily demand × Lead time in days) + Safety Stock</p><p>Example: Avg daily demand = 15 units. Lead time = 42 days (6 weeks). Safety stock = 240 units.<br/>ROP = (15 × 42) + 240 = 630 + 240 = <strong>870 units</strong></p><p>Interpretation: when inventory drops to 870 units, place a purchase order immediately. The 630 units will sell during the 42-day lead time. The 240 units are your safety buffer if demand is higher than expected or the supplier runs late.</p></div><h3>Days of Inventory Outstanding (DIO)</h3><p>How many days of sales your current inventory covers. One of the most commonly reported retail KPIs and a direct measure of working capital efficiency.</p><div class="callout c-formula"><h4>Formula</h4><p>DIO = Current inventory units / Average daily sales units</p><p>Example: Current inventory = 1,500 units. Average daily sales = 50 units.<br/>DIO = 1,500 / 50 = <strong>30 days</strong></p></div><p>Too high DIO = cash tied up in slow-moving stock → finance is unhappy. Too low DIO = stockout risk → sales is unhappy. Target DIO depends on product lead time: you want DIO well above your lead time, plus your service level buffer. For a 6-week (42-day) lead time product, you'd ideally want DIO of 60–80 days.</p><h3>Economic Order Quantity (EOQ)</h3><div class="callout c-formula"><h4>Formula</h4><p>EOQ = √(2 × Annual demand × Ordering cost / Holding cost per unit per year)</p><p>Example: Annual demand = 2,600 units. Ordering cost per PO = Rp 500,000. Holding cost = Rp 25,000/unit/year.<br/>EOQ = √(2 × 2,600 × 500,000 / 25,000) = √104,000 = <strong>322 units</strong></p></div><p><strong>Important caveat:</strong> EOQ is more useful for year-round replenishment products than seasonal fashion. For seasonal items with a single buy, the order quantity is determined by the seasonal forecast and margin strategy — not EOQ optimization. Know the formula; understand when it applies.</p><div class="callout c-case"><h4>Case study: When safety stock saved the season</h4><p>A demand planner was preparing for back-to-school season. Her base forecast called for 3,500 units of a popular backpack. Her safety stock formula — based on 12 weeks of demand variability and 6-week lead time — suggested 800 additional units. Her manager wanted to cut this to 400 to free up cash.</p><p>She pushed back with data: the CV (coefficient of variation) for this SKU in peak season was 0.35 — high variability. The cost of a stockout (lost sales plus emergency air freight) far exceeded the holding cost of the extra 400 units. They kept the full safety stock.</p><p>Actual demand in the first 3 weeks of season ran 22% above forecast. Without the buffer, they would have stocked out in week 4 of a 6-week selling window. The 800-unit safety stock turned a potential crisis into a controlled situation with a smooth emergency replenishment triggered at the right moment.</p></div><div class="callout c-task"><h4>Today's task</h4><p>A Kanmo children's shoe SKU: Average weekly sales = 80 units. Max weekly sales (observed over 52 weeks) = 130 units. Standard deviation of weekly demand = 20 units. Lead time = 8 weeks. Target service level = 95% (Z=1.65).</p><p>(1) Calculate safety stock using both the simplified and statistical formulas. Which is higher? When would you prefer each? (2) Calculate the reorder point. (3) Current inventory is 1,200 units. Calculate DIO. Is this healthy given the lead time? (4) It's now week 8 and inventory is 650 units. Sales last week were 105 units. What specific actions, if any, do you take today? Show your reasoning step by step.</p></div>`},
{d:12,title:"S&OP: the demand review",phase:2,pillar:"dp",tags:["dp"],time:"55 min",content:`<h2>S&OP — the process that makes demand planning real</h2><div class="mod-meta">Phase 2 · Day 12 · Demand Planning · 55 min</div><p>All the forecasting math from the past four days is only useful if it influences actual business decisions. Sales & Operations Planning (S&OP) is the monthly process that makes this happen — forcing all functions to align around a single demand and supply plan. It's also the meeting where your credibility as a demand planner is most publicly on display, every single month.</p><h3>What S&OP actually is</h3><p>Without S&OP, each function runs on its own plan. Sales is optimistic about revenue. Supply Chain is conservative about inventory spend. Finance is working from a budget set six months ago. Nobody is reconciling the gaps. The result is misaligned expectations, systematic inefficiency, and finger-pointing when actual results diverge from plan — which they always do.</p><p>S&OP forces one integrated plan. It's not just a meeting — it's a management system. Done well, it means stockouts drop, excess inventory drops, and the business runs more efficiently. Done poorly, it becomes a monthly blame session that everyone resents attending.</p><h3>The four-step S&OP cycle</h3><p><strong>Step 1 — Demand Review (your meeting):</strong> You present the statistical forecast, incorporate market intelligence from Sales and Marketing, and agree on a consensus demand plan for the next 3–6 months. Output: the official demand plan.</p><p><strong>Step 2 — Supply Review:</strong> The supply chain team checks whether the demand plan is achievable given supplier capacities, lead times, and existing open orders. Output: confirmed supply plan or flagged constraints.</p><p><strong>Step 3 — Pre-S&OP (reconciliation):</strong> Demand plan, supply plan, and financial projections are compared. Gaps are identified. Options for resolution are prepared for executive decision-making.</p><p><strong>Step 4 — Executive S&OP:</strong> Senior leadership approves the integrated plan, resolves unreconciled trade-offs, and sets the operational commitment for the next month. Output: the official plan all functions execute against.</p><h3>Running the demand review well</h3><p><strong>Before the meeting:</strong> Distribute a pre-read to attendees at least 48 hours in advance. People who've seen the data before the meeting have better input — they've had time to think, to consult their teams, and to bring specific market intelligence rather than reacting in the moment.</p><p><strong>The demand review agenda structure:</strong></p><ol><li>Performance vs plan (10 min): last month's actuals vs forecast. What happened? Top 3 variance drivers.</li><li>Statistical forecast update (10 min): new model output for next 3–6 months. What changed from last month?</li><li>Market intelligence input (20 min): what does Sales know that the model doesn't? Upcoming promotions, competitor moves, customer signals.</li><li>Consensus forecast (15 min): agree on the adjusted forecast. Document every adjustment and who proposed it.</li><li>Risks and assumptions (5 min): what would have to be true for this forecast to be right? What would cause it to miss?</li></ol><p><strong>After the meeting:</strong> Distribute consensus forecast and meeting minutes within 24 hours. Update the system. Anything that isn't written down and distributed didn't happen.</p><h3>Presenting forecasts to non-analysts</h3><p>Brand managers and sales directors care about business outcomes, not methodology. Here's how to present forecasts to this audience:</p><ul><li><strong>Lead with the so-what, not the how.</strong> "Q3 forecast is 15% above last year, driven by the Lebaran shift and the Surabaya store opening" beats "I applied Holt's ETS with α=0.3 and β=0.1."</li><li><strong>Use ranges.</strong> "45,000–52,000 units, base case 48,000" builds more credibility than "exactly 48,000 units." Showing uncertainty is a sign of analytical sophistication, not weakness.</li><li><strong>Make assumptions explicit.</strong> "This assumes the June promotion generates 25% uplift. If it's cancelled, revise down by ~8,000 units."</li><li><strong>Track your calls publicly.</strong> When you called something correctly — especially something others doubted — acknowledge it factually. This builds a track record without self-promotion.</li></ul><div class="callout c-case"><h4>Case study: The demand review that changed everything</h4><p>A new demand planner inherited an S&OP process that had become a monthly blame session. The previous planner had presented forecasts as precise commitments. When actuals missed, Sales blamed the forecast. When supply was short, Operations blamed Sales for bad market intelligence. Everyone was defensive.</p><p>The new planner made three changes: (1) She introduced explicit assumptions documentation — every forecast came with a "what needs to be true" list. (2) She tracked who proposed which market intelligence adjustments and whether they proved accurate. (3) She reframed the meeting opening: "Our job today is to build the best possible plan together — not to defend our positions from last month."</p><p>Within three cycles, the meeting had shifted from adversarial to collaborative. Forecast accuracy improved 8 percentage points because brand managers started sharing market intelligence they had previously withheld (not wanting to be blamed if it was wrong). The change was almost entirely cultural, not analytical.</p></div><div class="callout c-task"><h4>Today's task</h4><p>Design the full S&OP demand review meeting for one Kanmo brand. Your deliverable: (1) Full meeting agenda with time allocation for each item. (2) The 5 data items you'd include in the pre-read — and why each matters. (3) The 3 questions you'd ask the brand commercial manager to draw out market intelligence they might not volunteer. (4) What the output consensus forecast document looks like — describe its format, columns, and what decisions it enables. (5) Three failure modes common in demand review meetings, and what you'd do specifically to prevent each one.</p></div>`},
{d:13,title:"Secure early wins",phase:2,pillar:"90d",tags:["90d","dp"],time:"40 min",content:`<h2>Secure early wins — credibility before you need it</h2><div class="mod-meta">Phase 2 · Day 13 · First 90 Days Framework · 40 min</div><p>By day 30–45 in a new role, the grace period is ending. Your manager is expecting deliverables, not just questions. Stakeholders are forming views about whether you're someone who gets things done or someone who talks a lot in meetings. Early wins are small, targeted improvements that accomplish three things simultaneously: they make someone's life better, they demonstrate your competence and judgment, and they build the political capital you'll need to make bigger changes later.</p><h3>The four criteria for a good early win</h3><p><strong>Visible:</strong> The improvement can be seen and appreciated by people who matter to your success. A brilliant technical improvement that nobody notices is not an early win — it's a wasted opportunity.</p><p><strong>Achievable:</strong> Something you can actually deliver in 30–45 days with the access and resources you currently have. A complete overhaul of the forecasting methodology is not an early win — it's a hostage to fortune.</p><p><strong>Meaningful:</strong> It addresses a pain point stakeholders actually feel. A win that only you care about is a hobby project. Before you invest time in something, test whether your key stakeholders would care about the outcome.</p><p><strong>Reputation-consistent:</strong> The win should reinforce the professional identity you're building. If you want to be known as analytically rigorous, demonstrate analytical rigor. If you want to be known as someone who makes things work across functions, find a win that requires cross-functional collaboration.</p><h3>Early win opportunities in demand planning</h3><p><strong>Fix a report that everyone complains about.</strong> Almost every demand planning team has at least one report that's confusing, manual to produce, or doesn't answer the questions stakeholders actually have. Redesigning even one report to be clearer and faster is visible, appreciated, and usually achievable in a week or two.</p><p><strong>Find and fix a forecasting anomaly.</strong> When you look at data with fresh eyes, you often spot things the existing team has become blind to — a product category consistently over-forecast by 15%, a seasonal index that hasn't been updated in two years, a SKU with obvious systematic bias. These discoveries, presented constructively ("I found something in the data I thought was worth looking at"), create enormous goodwill.</p><p><strong>Build one missing piece of analysis.</strong> Is there a question stakeholders always ask that nobody has a ready answer to? "How much excess inventory are we holding that's at markdown risk?" "What's our fill rate by store?" Building the analysis that answers a frequently-asked question is useful and visible simultaneously.</p><p><strong>Improve the S&OP meeting structure.</strong> If you've diagnosed the demand review as dysfunctional (Day 12's case study), making one specific structural change — adding a pre-read, introducing assumptions documentation — is a powerful early win especially if you involve stakeholders in designing the change.</p><h3>The psychology of early wins</h3><p>Early wins create momentum. Once stakeholders see you deliver something valuable, they're more likely to share information with you, support your recommendations, and give you the benefit of the doubt when something goes wrong. Credibility is like a bank account — early wins make deposits, and you spend from it when you need to push for change.</p><p>If your first 45 days produce a lot of questions but no visible output, people become impatient — even if your behind-the-scenes work is excellent. Manage perceptions actively by communicating work-in-progress before it's complete.</p><div class="callout c-watkins"><p>"Early wins build your credibility and create mome
