{d:28,title:"Build your flagship tool",phase:3,pillar:"ai",tags:["ai","dp"],time:"50 min",content:`<h2>Build your flagship tool — your most visible 90-day contribution</h2><div class="mod-meta">Phase 3 · Day 28 · AI & Automation · 50 min</div><p>You've covered prompt engineering, workflow automation, the Anthropic API, and Python. Today you integrate them into a flagship tool — the project that demonstrates your ability to bridge analytical skill and technical initiative. This is the thing you'll point to in your first 90-day review as evidence of genuine impact, not just competence.</p><h3>What makes a tool "flagship" worthy</h3><ul><li><strong>Saves meaningful time:</strong> At least 2–3 hours per week for you or your team. Less than this is a nice-to-have.</li><li><strong>Improves quality:</strong> The output is objectively better — more accurate, more consistent, more clearly communicated.</li><li><strong>Used repeatedly:</strong> Not a one-time analysis but a regular process that keeps delivering value.</li><li><strong>Visible to stakeholders:</strong> The right people can see it working and connect it to improved outcomes.</li><li><strong>Buildable in the time you have:</strong> A realistic MVP that works before you try to make it perfect.</li></ul><h3>Three flagship tool options for your role</h3><p><strong>Option A — AI-powered weekly demand review pack:</strong> Each week: pulls latest actuals data, compares to forecast across all brands, calculates MAPE and bias, identifies top 5 exception SKUs, generates AI-written commentary per brand explaining variances and recommending actions. Output: a formatted document ready for the S&OP meeting. Stack: Python + Anthropic API + Excel/Word template. Time to build MVP: 8–12 hours. Time saved: 2.5–4 hours per week.</p><p><strong>Option B — Stockout risk early warning system:</strong> Weekly or daily: takes current inventory levels, calculates projected days of coverage per SKU based on current sell-through rate, identifies any SKU that will fall below safety stock threshold within 4 weeks, sends alert email to demand planner and supply chain contact with recommended action. Stack: Python + Power Automate or email script. Time to build MVP: 6–8 hours. Value: prevents stockouts worth many multiples the build cost.</p><p><strong>Option C — Seasonal planning workbook:</strong> Excel-based: uses Power Query to pull historical sales data, automatically calculates seasonal indices by brand and category, applies them to the current base forecast, generates a 12-month seasonal forecast, produces one-page summary per brand. Replaces manual work across multiple files. Stack: Advanced Excel (Power Query + FORECAST.ETS). Time to build MVP: 6–10 hours. Value: primarily quality improvement and ~1 hour saved per brand per planning cycle.</p><h3>The MVP principle</h3><p>The most common mistake in building internal tools: over-engineering version one. Build the simplest version that does the core job. Use it for 2–3 weeks. Find out what's actually useful versus what you thought would be useful. Improve based on real feedback.</p><p>Version 1 doesn't need a beautiful interface. It needs to read your data and save you 2 hours. If it does that, version 1 is a success. Polish is for version 2, after you know the tool is genuinely used.</p><h3>How to introduce the tool without threatening anyone</h3><ol><li>Use it yourself for 2–3 weeks. Verify it produces reliable outputs.</li><li>Show it to one colleague informally: "I built something I've been using that saves time on the weekly pack — want to try it?"</li><li>If they like it, adapt it for their brand or use case.</li><li>Once 2–3 people are using it, it's a team asset. Surface it more broadly and let it speak for itself.</li></ol><div class="callout c-task"><h4>Today's task</h4><p>Write a complete, ready-to-execute build plan for your flagship tool. Choose one of the three options above (or design your own) and write:</p><p>(1) Tool name and one-sentence description. (2) The specific problem it replaces. (3) Architecture: data in → processing → output. (4) Technical stack: which tools and why. (5) Build plan: what you'd specifically do in hour 1, 2, 3... through MVP completion. (6) The exact prompt you'd give Claude to help build the core component. (7) How you'd test it before using with real stakeholders. (8) How you'd introduce it to your team without it feeling threatening. (9) What version 2 would add once v1 is working and validated.</p></div>`},
{d:29,title:"Write your 30-60-90 day plan",phase:3,pillar:"90d",tags:["90d"],time:"50 min",content:`<h2>Write your 30-60-90 day plan — your contract with yourself</h2><div class="mod-meta">Phase 3 · Day 29 · First 90 Days Framework · 50 min</div><p>The 30-60-90 day plan is primarily a tool for your own clarity — a forcing function that translates everything from the past 28 days into specific, time-bound commitments. Writing it reveals gaps in your thinking. If you can't describe what you'll be doing in week 3 specifically, that's a signal you need to think harder before you start. The plan also gives you something to measure yourself against, which is the only way to know whether you're on track or drifting.</p><h3>Days 1–30: Listen, learn, build foundations</h3><p>The governing principle is restraint. You are not there to prove yourself through action — you're there to build the foundation that will allow you to act well later.</p><p><strong>Specific commitments for this phase:</strong></p><ul><li>Complete your learning agenda — answer all key questions about the past, present, and future of the function</li><li>Have a 30-minute 1:1 with each of the 6–8 key stakeholders identified in your stakeholder map</li><li>Complete the 5 Conversations with your manager — aligned on situation, expectations, style, resources, development</li><li>Identify your top 2 early win opportunities and have a rough execution plan for each</li><li>Understand the current state completely: tools, processes, data availability, accuracy levels, team pain points</li></ul><p><strong>What you explicitly do not do in days 1–30:</strong> Propose major process changes. Make sweeping statements about what's wrong. Take sides in conflicts you don't fully understand yet.</p><h3>Days 31–60: Diagnose, deliver, build credibility</h3><p>By day 31 you have enough context to act. The goals:</p><ul><li>Execute your 2 early wins — deliver them, communicate them appropriately, use the momentum</li><li>Begin leading the demand review meeting — even if not yet fully independent, take increasing ownership</li><li>Complete a full S&OP cycle with genuine understanding of every step</li><li>Identify the 3 structural improvements the demand planning function needs most</li><li>Have a working MVP of your flagship tool by day 60</li></ul><h3>Days 61–90: Contribute strategically, present your roadmap</h3><p>By day 61 you should be operating with significant autonomy. The goals:</p><ul><li>Lead the demand review meeting independently and professionally</li><li>Present your 3–6 month demand planning improvement roadmap to your manager</li><li>Have your flagship tool deployed and in regular use</li><li>Have genuine alliances with at least 2 key cross-functional stakeholders</li><li>Be known for at least one specific capability the team didn't have before you arrived</li></ul><h3>Making it specific: the planning questions</h3><p>"Build relationships" is not a plan. "Have 30-minute 1:1s with each of the 6 brand commercial managers in weeks 1–2 using the PROPHET framework questions" is a plan. Apply this level of specificity throughout:</p><ul><li>Which specific stakeholders in week 1, and with what agenda?</li><li>What specific data do you request before your start date?</li><li>What specific early win do you target, by what specific date?</li><li>What specific deliverable will you present at your 30-day review?</li><li>Which brand do you focus on first for your flagship tool?</li></ul><div class="callout c-watkins"><p>"No matter how much preparation time you get, start planning what you hope to accomplish by specific milestones. The goal is to build momentum that carries you forward — virtuous cycles of credibility and trust that become self-reinforcing."</p></div><div class="callout c-case"><h4>Case study: The plan that became a performance review</h4><p>A BA associate manager joined a multi-brand group with a written 30-60-90 day plan, shared with her manager on day 3. Her manager — who had hired 12 people before her — told her later he had never had a direct report arrive with a written plan. It immediately changed his perception of her: not "new hire in the learning phase" but "self-directed professional who knows what she's doing." He gave her more autonomy, more access to senior stakeholders, and more freedom to experiment than he would have otherwise.</p><p>At her 90-day review, she used the plan as the structure for the conversation: here's what I committed to, here's what I delivered, here's where I fell short and why, here's what I've learned. The review took 30 minutes and ended with a discussion about her 6-month goals. Her manager described her to HR as "the strongest 90-day performer I've had."</p></div><div class="callout c-task"><h4>Today's task — the most important task in this curriculum</h4><p>Write your complete 30-60-90 day plan for Kanmo Group. This is a real document — write it as if you're going to share it with your manager on day 3. Minimum 600 words.</p><p>Structure: (1) Days 1–30: governing principle, 5 specific commitments, how you'll measure success. (2) Days 31–60: 3 specific deliverables with target dates. (3) Days 61–90: strategic contributions and what success looks like. (4) Cross-cutting: relationship-building plan (who, when, what), learning plan, self-management approach. (5) Risks: what could prevent you from delivering this plan, and your mitigation for each.</p></div>`},
{d:30,title:"Final review & launch",phase:3,pillar:"90d",tags:["90d","dp","fm","ai"],time:"60 min",content:`<h2>Final review & launch — you're ready</h2><div class="mod-meta">Phase 3 · Day 30 · Integration Day · 60 min</div><p>Thirty days ago you started this curriculum as someone who knew they were entering a demanding new role in a domain they were still learning. Today you finish it as someone who understands demand planning mechanics, financial modelling, transition management, and AI tools — and more importantly, how all of these connect to create real business value in a multi-brand retail environment like Kanmo Group.</p><p>This final module is synthesis. A structured review of everything covered. An integration of the threads that connect it. And a practical send-off for the start you're about to make.</p><h3>Complete review: what you now know</h3><p><strong>The First 90 Days framework:</strong> Why transitions fail — the Success Trap, the absent expectation-setting, the misread situation. The full toolkit: STARS for situational diagnosis, the learning agenda for systematic knowledge acquisition, the 5 Conversations for alignment, early wins for credibility, alliance-building for long-term influence. The underlying principle: slow down to speed up. Listen before acting. Build before changing.</p><p><strong>Demand planning fundamentals:</strong> The retail supply chain and its time lags. The three forecasting methods — SMA, WMA, ETS — and when each applies. Seasonality and trend decomposition, including the Indonesian retail calendar (Lebaran, back-to-school, year-end). Forecast accuracy metrics — MAPE, WMAPE, bias — and how to improve them. Inventory planning — safety stock, ROP, DIO, and the fundamental holding vs stockout trade-off. The S&OP process and your role in it.</p><p><strong>Financial modelling:</strong> P&L structure and how your forecast connects to every line. Gross margin and working capital mechanics. Scenario analysis and three-scenario frameworks. Variance decomposition into volume, price, and mix. Variance commentary that drives decisions rather than just describing data.</p><p><strong>AI and automation:</strong> Prompt engineering templates ready to use from day one. Workflow automation design — specific high-value automations for your role. The Anthropic API and how to build your demand planning assistant. Python and pandas fundamentals. A flagship tool fully designed and ready to build.</p><h3>The three threads that connect everything</h3><p><strong>Data without communication is worthless.</strong> The best forecast in the world does nothing if it's not presented clearly to the right people at the right time. Every analytical skill you've developed needs a paired communication skill: variance analysis needs commentary, risk models need briefings, dashboards need audiences.</p><p><strong>Relationships are the infrastructure of everything else.</strong> Every tool, model, and process you build depends on the cooperation of people who don't work for you. The demand planner who invests in relationships consistently outperforms the one who doesn't — even when the latter has superior technical skills.</p><p><strong>The first 90 days set the pattern for years.</strong> The impressions formed, the trust built or not built, the early wins delivered or missed — these create patterns that are remarkably sticky. The investment you've made in these 30 days is not primarily about the knowledge. It's about arriving ready to make the most of the window that every new role opens.</p><h3>The kind of BA you want to be</h3><p>Before you walk in, define the professional identity you want to build. Not the tactical version but the deeper one: what do you want to be known for in 12 months?</p><ul><li><strong>The analyst who makes data accessible:</strong> Known for translating complexity into clarity, for the report everyone actually reads, for making non-analytical colleagues feel confident using data.</li><li><strong>The planner who drives accuracy:</strong> Known for consistently improving forecast performance, for rigorous methodology, for being the person the CFO calls when they need a reliable number.</li><li><strong>The builder:</strong> Known for bringing new capability — tools, processes, automation — that didn't exist before.</li><li><strong>The connector:</strong> Known for cross-functional relationships, for getting Sales and Finance and Operations genuinely aligned, for making the S&OP something people value rather than endure.</li></ul><p>Most great BAs are some combination of all four. But knowing which you're leading with helps you decide where to invest your energy in the first 90 days.</p><h3>Your pre-start checklist</h3><ul><li>Learning agenda written (Day 3)</li><li>STARS diagnosis and confirmation questions ready (Day 2)</li><li>Stakeholder map complete (Day 6)</li><li>5 Conversations prepared (Day 7)</li><li>Early win opportunities identified (Day 13)</li><li>30-60-90 day plan written (Day 29)</li><li>Flagship tool designed and ready to build (Day 28)</li><li>AI prompt library saved in Notes (Day 21)</li><li>Automation workflows designed (Day 22)</li></ul><div class="callout c-watkins"><p>"Every successful career is a series of successful assignments, and every successful assignment is launched with a successful transition. What you do in the first 90 days will set the tone for everything that follows."</p></div><div class="callout c-task"><h4>Final task — your launch statement</h4><p>Write two things as your Day 30 output:</p><p><strong>Part 1 — Your first team meeting introduction (max 300 words):</strong> What you'd actually say in your first team meeting at Kanmo. Cover: your background and what it brings to this role, what drew you to demand planning and to Kanmo specifically, one specific commitment you're making for your first 90 days, and one genuine question for the team. This is your public declaration of intent. Write it as something you would actually say, not as a template.</p><p><strong>Part 2 — Your private answer to this question:</strong> What kind of BA do you want to be known as in 12 months — and what is the single most important thing that will determine whether you achieve that? One paragraph. Honest. For your eyes only.</p><p>Save both in Notes. Read them again at the end of your first week at Kanmo. See what holds up and what you'd revise.</p></div>`},
];

const PHASES=[
  {n:"Phase 1",label:"Prepare & Orient",days:"Days 1–7",sub:"Build your mental model before day one"},
  {n:"Phase 2",label:"Learn the Craft",days:"Days 8–20",sub:"Master demand planning and financial modelling"},
  {n:"Phase 3",label:"Build & Integrate",days:"Days 21–30",sub:"AI tools, automation, and your 90-day plan"}
];
const PILLARS=[
  {key:"90d",label:"First 90 Days",color:"#c8392b"},
  {key:"dp",label:"Demand Planning",color:"#0c447c"},
  {key:"fm",label:"Financial Modelling",color:"#633806"},
  {key:"ai",label:"AI & Automation",color:"#27500a"}
];
const TAG_LABELS={dp:"Demand Planning","90d":"First 90 Days",fm:"Financial",ai:"AI & Auto"};

let done=JSON.parse(localStorage.getItem('lms_done')||'[]');
let notes=JSON.parse(localStorage.getItem('lms_notes')||'{}');
let expandedDay=null;
let activeWeek=1;

function save(){localStorage.setItem('lms_done',JSON.stringify(done));}
function curDay(){return Math.min(30,done.filter(x=>x.startsWith('day-')).length+1);}
function getPhase(d){return d<=7?1:d<=20?2:3;}

function go(id,btn){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='progress')renderProgress();
  if(id==='notes')renderNotesList();
}

function renderDash(){
  const doneD=done.filter(x=>x.startsWith('day-')).length;
  const pct=Math.round((doneD/30)*100);
  const cd=curDay();
  const ph=PHASES[getPhase(cd)-1];
  document.getElementById('bigFill').style.width=pct+'%';
  document.getElementById('pb-pct').textContent=pct+'%';
  document.getElementById('pb-title').textContent=ph.n+': '+ph.label;
  document.getElementById('pb-sub').textContent=ph.days+' · '+ph.sub;
  document.getElementById('topPhase').textContent='Phase '+getPhase(cd);
  document.getElementById('topDay').textContent='Day '+cd+'/30';
  document.getElementById('segRow').innerHTML=DAYS.map((_,i)=>{
    const dn=i+1;
    const bg=done.includes('day-'+dn)?'#27500a':dn===cd?'#c8392b':'var(--surface2)';
    return `<div class="seg" style="background:${bg}"></div>`;
  }).join('');
  document.getElementById('s1').textContent=doneD;
  document.getElementById('s2').textContent=Object.values(notes).filter(v=>v.trim()).length;
  document.getElementById('s3').textContent=pct+'%';
  document.getElementById('s4').textContent=DAYS[cd-1]?DAYS[cd-1].title:'—';
  const pc={};const pd={};
  PILLARS.forEach(p=>{pc[p.key]=0;pd[p.key]=0;});
  DAYS.forEach((d,i)=>{pc[d.pillar]++;if(done.includes('day-'+(i+1)))pd[d.pillar]++;});
  document.getElementById('pillarGrid').innerHTML=PILLARS.map(p=>{
    const pp=pc[p.key]>0?Math.round((pd[p.key]/pc[p.key])*100):0;
    return `<div class="pcell"><h4 style="color:${p.color}">${p.label}</h4><div class="mini-bar"><div class="mini-fill" style="width:${pp}%;background:${p.color}"></div></div><div class="mini-pct">${pp}% · ${pd[p.key]}/${pc[p.key]} days</div></div>`;
  }).join('');
  const td=DAYS[cd-1];
  document.getElementById('todayBadge').textContent='Day '+cd+' · '+td.title;
  document.getElementById('todayRows').innerHTML=[
    {icon:'📖',label:'Read',title:'Day '+cd+': '+td.title,desc:td.time+' of reading, case studies & examples',time:td.time,id:'r'+cd,color:'var(--blue-bg)'},
    {icon:'✏️',label:'Task',title:'Complete the day\'s task',desc:'Write your answer in the Notes tab',time:'30 min',id:'t'+cd,color:'var(--amber-bg)'},
    {icon:'📝',label:'Reflect',title:'Save your notes',desc:'Capture takeaways and task answers',time:'10 min',id:'n'+cd,color:'var(--green-bg)'},
  ].map(l=>`<div class="lrow" onclick="handleLesson('${l.id}',${cd})">
    <div class="lic" style="background:${l.color}">${l.icon}</div>
    <div class="li-info"><h4>${l.label}: ${l.title}</h4><p>${l.desc}</p></div>
    <span class="li-time">${l.time}</span>
    <div class="lcheck ${done.includes(l.id)?'done':''}" onclick="toggleLesson(event,'${l.id}')">${done.includes(l.id)?'✓':''}</div>
  </div>`).join('');
}

function toggleLesson(e,id){
  e.stopPropagation();
  done=done.includes(id)?done.filter(x=>x!==id):[...done,id];
  save();renderDash();
}

function handleLesson(id,day){
  if(id.startsWith('n')){
    goPage('notes');
    setTimeout(()=>{document.getElementById('noteSel').value=day;loadNote(day);},100);
  } else {
    goPage('cal');
    activeWeek=Math.ceil(day/5);expandedDay=day;
    renderCal();
    setTimeout(()=>{const el=document.getElementById('dc-'+day);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},200);
  }
}

function goPage(name){
  const ids=['dash','cal','progress','notes'];
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  document.querySelectorAll('.ntab')[ids.indexOf(name)].classList.add('on');
}

function renderCal(){
  document.getElementById('weekTabs').innerHTML=[1,2,3,4,5,6].map(w=>`<button class="wtab ${w===activeWeek?'on':''}" onclick="setWeek(${w})">Week ${w}</button>`).join('');
  const cd=curDay();
  const s=(activeWeek-1)*5+1;
  const e=Math.min(30,activeWeek*5);
  document.getElementById('dayCards').innerHTML=DAYS.slice(s-1,e).map((d,i)=>{
    const dn=s+i;
    const isDone=done.includes('day-'+dn);
    const isToday=dn===cd;
    const isOpen=expandedDay===dn;
    const body=isOpen?`<div class="dc-body show">
      <div class="module-content">${d.content}</div>
      <div class="dc-actions">
        <button class="action-btn" onclick="goNotes(${dn},event)">✏️ Notes for Day ${dn}</button>
        <div class="mark-row">
          <div class="lcheck ${isDone?'done':''}" onclick="markDone(event,${dn})">${isDone?'✓':''}</div>
          <span>${isDone?'Completed':'Mark day complete'}</span>
        </div>
      </div>
    </div>`:'<div class="dc-body"></div>';
    return `<div class="dcard ${isOpen?'open':''}" id="dc-${dn}" onclick="toggleDay(${dn})">
      <div class="dc-head">
        <div class="dnum ${isToday?'cur':isDone?'fin':''}">${dn}</div>
        <div class="dc-meta"><h4>${d.title}</h4><p>${d.tags.map(t=>TAG_LABELS[t]).join(' · ')} · ${d.time}</p></div>
        <div class="dc-tags">${d.tags.map(t=>`<span class="dtag t-${t}">${TAG_LABELS[t]}</span>`).join('')}</div>
      </div>${body}</div>`;
  }).join('');
}

function setWeek(w){activeWeek=w;expandedDay=null;renderCal();}
function toggleDay(n){expandedDay=expandedDay===n?null:n;renderCal();}
function markDone(e,n){
  e.stopPropagation();
  const id='day-'+n;
  done=done.includes(id)?done.filter(x=>x!==id):[...done,id];
  save();renderDash();renderCal();
}
function goNotes(n,e){
  e.stopPropagation();
  goPage('notes');
  setTimeout(()=>{document.getElementById('noteSel').value=n;loadNote(n);},100);
}

function renderProgress(){
  const cd=curDay();
  document.getElementById('progressContent').innerHTML=[[1,5],[6,10],[11,15],[16,20],[21,25],[26,30]].map((range,wi)=>{
    const[s,e]=range;
    const wdays=DAYS.slice(s-1,e);
    const wdone=wdays.filter((_,i)=>done.includes('day-'+(s+i))).length;
    const wpct=Math.round((wdone/wdays.length)*100);
    return `<div class="prog-week">
      <div class="prog-week-head"><h3>Week ${wi+1}</h3><span class="prog-week-pct">${wpct}% · ${wdone}/${wdays.length}</span></div>
      ${wdays.map((d,i)=>{
        const dn=s+i;const isDone=done.includes('day-'+dn);const isToday=dn===cd;
        return `<div class="prog-day-row">
          <span class="prog-day-num" style="color:${isToday?'var(--red)':isDone?'var(--green)':'var(--hint)'}">Day ${dn}</span>
          <span class="prog-day-title" style="font-weight:${isToday?600:400}">${d.title}</span>
          <div class="prog-day-tags">${d.tags.map(t=>`<span class="dtag t-${t}">${TAG_LABELS[t]}</span>`).join('')}</div>
          <div class="prog-check ${isDone?'done':''}" onclick="toggleProg(${dn})">${isDone?'✓':''}</div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function toggleProg(n){
  const id='day-'+n;
  done=done.includes(id)?done.filter(x=>x!==id):[...done,id];
  save();renderDash();renderProgress();
}

function initNotes(){
  const sel=document.getElementById('noteSel');
  sel.innerHTML=DAYS.map(d=>`<option value="${d.d}">Day ${d.d}: ${d.title}</option>`).join('');
  sel.addEventListener('change',()=>loadNote(parseInt(sel.value)));
  loadNote(curDay());
  renderNotesList();
}
function loadNote(n){
  document.getElementById('noteSel').value=n;
  document.getElementById('noteArea').value=notes['d'+n]||'';
}
function saveNote(){
  const n=parseInt(document.getElementById('noteSel').value);
  const txt=document.getElementById('noteArea').value;
  if(txt.trim())notes['d'+n]=txt;else delete notes['d'+n];
  localStorage.setItem('lms_notes',JSON.stringify(notes));
  const f=document.getElementById('savedFlash');f.style.display='inline';
  setTimeout(()=>f.style.display='none',2000);
  renderNotesList();renderDash();
  const lid='n'+n;
  if(!done.includes(lid)&&txt.trim()){done.push(lid);save();}
}
function renderNotesList(){
  const entries=Object.entries(notes).filter(([,v])=>v.trim());
  document.getElementById('notesList').innerHTML=entries.length===0
    ?'<div class="empty-notes">No notes yet. Complete each day\'s task and write your answers here.</div>'
    :entries.map(([k,v])=>{
      const n=parseInt(k.replace('d',''));const d=DAYS[n-1];
      return `<div class="note-card">
        <div class="note-card-head">
          <span class="nlabel">Day ${n}: ${d?.title||''}</span>
          <div class="nact"><small>${v.length} chars</small><button class="del-btn" onclick="delNote('${k}')">delete</button></div>
        </div>
        <p>${v.substring(0,280)}${v.length>280?'\n\n[edit above to read more...]':''}</p>
      </div>`;
    }).join('');
}
function delNote(k){
  if(confirm('Delete this note?')){delete notes[k];localStorage.setItem('lms_notes',JSON.stringify(notes));renderNotesList();renderDash();}
}

renderDash();renderCal();initNotes();
</script>
</body>
</html>
